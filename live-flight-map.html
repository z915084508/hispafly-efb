<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HISPAFLY EFB | Live Flight Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --red: #d71920;
            --yellow: #ffc400;
            --line: rgba(255,255,255,0.14);
            --muted: rgba(255,255,255,0.66);
            --danger: #ff6b6b;
            --ok: #72f0a3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #05080d;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            background: #05080d;
        }

        .header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            padding: 18px 20px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            background: rgba(1,3,7,0.86);
        }

        .eyebrow {
            color: var(--yellow);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        h1 {
            font-size: clamp(26px, 3vw, 40px);
            line-height: 1;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
            margin-top: 7px;
        }

        .refresh {
            min-width: 118px;
            min-height: 42px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            font-weight: 800;
        }

        .map-panel {
            min-height: 0;
            display: grid;
            grid-template-rows: 1fr auto;
            background: rgba(4,7,12,0.62);
        }

        #liveOpsMap {
            width: 100%;
            height: 100%;
            min-height: 420px;
            display: block;
            background:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, rgba(255,196,0,0.10), transparent 34%),
                rgba(0,0,0,0.28);
            background-size: 42px 42px, 42px 42px, auto, auto;
        }

        .leaflet-container {
            background: #07111f;
            color: #111;
            font-family: Arial, Helvetica, sans-serif;
        }

        .leaflet-control-attribution {
            background: rgba(255,255,255,0.76);
        }

        .plane-icon {
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            background: rgba(255,196,0,0.22);
            border: 1px solid rgba(255,196,0,0.76);
            box-shadow: 0 0 18px rgba(255,196,0,0.42);
            color: var(--yellow);
            font-size: 17px;
            font-weight: 900;
        }

        .plane-icon span {
            display: block;
            line-height: 1;
        }

        .map-footer {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 14px;
            border-top: 1px solid rgba(255,255,255,0.10);
            background: rgba(0,0,0,0.28);
        }

        .stat {
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
        }

        .stat span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            margin-bottom: 4px;
        }

        .stat strong {
            display: block;
            font-size: 14px;
        }

        .error {
            color: var(--danger);
        }

        body.embedded .header {
            display: none;
        }

        body.embedded .app,
        body.embedded .map-panel {
            height: 100vh;
        }

        @media (max-width: 820px) {
            .map-footer {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="header">
            <div>
                <div class="eyebrow">Live Ops</div>
                <h1>Live Flight Map</h1>
                <p class="muted" id="statusText">Loading active VAMSYS flights...</p>
            </div>
            <button class="refresh" id="refreshBtn">REFRESH</button>
        </div>

        <div class="map-panel">
            <div id="liveOpsMap"></div>
            <div class="map-footer">
                <div class="stat"><span>Active Flights</span><strong id="statActive">0</strong></div>
                <div class="stat"><span>Mapped</span><strong id="statMapped">0</strong></div>
                <div class="stat"><span>Refresh</span><strong>30s</strong></div>
                <div class="stat"><span>Updated</span><strong id="statUpdated">N/A</strong></div>
            </div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const embeddedMode = params.get("embedded") === "1";
        const REFRESH_MS = 30000;
        let map = null;
        let layer = null;
        let timer = null;

        window.addEventListener("DOMContentLoaded", () => {
            if (embeddedMode) document.body.classList.add("embedded");
            setupMap();
            document.getElementById("refreshBtn")?.addEventListener("click", () => loadLiveFlights(false));
            loadLiveFlights(false);
            timer = window.setInterval(() => loadLiveFlights(true), REFRESH_MS);
        });

        function setupMap() {
            if (typeof L === "undefined") {
                document.getElementById("statusText").innerHTML = `<span class="error">Map library did not load.</span>`;
                return;
            }

            map = L.map("liveOpsMap", {
                zoomControl: true,
                attributionControl: true
            }).setView([39.7, 2.9], 7);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 12,
                attribution: "&copy; OpenStreetMap contributors"
            }).addTo(map);

            layer = L.layerGroup().addTo(map);
            window.setTimeout(() => map.invalidateSize(), 120);
        }

        async function loadLiveFlights(silent) {
            if (!silent) document.getElementById("statusText").textContent = "Loading active VAMSYS flights...";
            try {
                const res = await fetch("/api/flight-map?include_posreps=true");
                const json = await res.json();
                if (!res.ok || json.error) throw new Error(json.message || json.error || `Flight map HTTP ${res.status}`);
                const flights = normalizeFlights(json);
                drawFlights(flights);
            } catch (err) {
                document.getElementById("statusText").innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
            }
        }

        function normalizeFlights(json) {
            const source = Array.isArray(json?.data)
                ? json.data
                : (Array.isArray(json) ? json : (Array.isArray(json?.flights) ? json.flights : []));

            return source.map((flight) => {
                const position = extractPosition(flight);
                const route = extractRoute(flight);
                return {
                    callsign: flight.booking?.callsign || flight.callsign || "UNKNOWN",
                    flightNumber: flight.booking?.flightNumber || flight.booking?.flight_number || "",
                    departure: flight.departureAirport?.icao || flight.departureAirport?.identifier || "",
                    arrival: flight.arrivalAirport?.icao || flight.arrivalAirport?.identifier || "",
                    phase: flight.progress?.currentPhase || flight.phase?.name || flight.phase || "ACTIVE",
                    altitude: firstDefined(flight.progress?.altitude, flight.booking?.altitude, ""),
                    speed: firstDefined(flight.progress?.groundSpeed, flight.progress?.groundspeed, ""),
                    heading: firstDefined(flight.progress?.magneticHeading, flight.progress?.magnetic_heading, 0),
                    position,
                    route
                };
            });
        }

        function drawFlights(flights) {
            if (!map || !layer) return;
            layer.clearLayers();

            const mapped = flights.filter((flight) => flight.position);
            const bounds = [];

            mapped.forEach((flight) => {
                if (flight.route.length >= 2) {
                    const routeLatLngs = flight.route.map((point) => [point.lat, point.lon]);
                    L.polyline(routeLatLngs, { color: "#10b981", weight: 4, opacity: 0.84 }).addTo(layer);
                    routeLatLngs.forEach((point) => bounds.push(point));
                    L.circleMarker(routeLatLngs[0], { radius: 7, color: "#72f0a3", fillColor: "#72f0a3", fillOpacity: 1 }).bindTooltip(flight.departure || "DEP").addTo(layer);
                    L.circleMarker(routeLatLngs[routeLatLngs.length - 1], { radius: 7, color: "#ff6b6b", fillColor: "#ff6b6b", fillOpacity: 1 }).bindTooltip(flight.arrival || "ARR").addTo(layer);
                }

                const marker = L.marker([flight.position.lat, flight.position.lon], {
                    icon: L.divIcon({
                        className: "plane-icon",
                        html: `<span style="transform:rotate(${Number(flight.heading || 0)}deg)">&#9650;</span>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).bindPopup(renderPopup(flight));
                marker.addTo(layer);
                bounds.push([flight.position.lat, flight.position.lon]);
            });

            if (bounds.length) {
                map.fitBounds(L.latLngBounds(bounds), { padding: [42, 42], maxZoom: 8 });
            }

            const now = new Date();
            document.getElementById("statusText").textContent = mapped.length
                ? "Live VAMSYS active flight positions loaded."
                : "Active flights loaded, but no usable coordinates were returned.";
            document.getElementById("statActive").textContent = String(flights.length);
            document.getElementById("statMapped").textContent = String(mapped.length);
            document.getElementById("statUpdated").textContent = `${String(now.getUTCHours()).padStart(2, "0")}:${String(now.getUTCMinutes()).padStart(2, "0")} UTC`;
            window.setTimeout(() => map.invalidateSize(), 80);
        }

        function renderPopup(flight) {
            return `
                <strong>${escapeHtml(flight.callsign)} ${escapeHtml(flight.flightNumber)}</strong><br>
                ${escapeHtml([flight.departure, flight.arrival].filter(Boolean).join(" - "))}<br>
                ${escapeHtml(formatValue(flight.phase, "ACTIVE"))}<br>
                ALT ${escapeHtml(formatValue(flight.altitude))} / GS ${escapeHtml(formatValue(flight.speed))}
            `;
        }

        function extractPosition(flight) {
            const candidates = [
                flight.progress?.location,
                flight.progress,
                flight.position,
                Array.isArray(flight.progress?.posreps) ? flight.progress.posreps[flight.progress.posreps.length - 1] : null,
                flight.departureAirport
            ].filter(Boolean);

            for (const item of candidates) {
                const parsed = parsePosition(item);
                if (parsed) return parsed;
            }
            return null;
        }

        function extractRoute(flight) {
            const route = [];
            const departure = parsePosition(flight.departureAirport);
            const arrival = parsePosition(flight.arrivalAirport);
            if (departure) route.push(departure);
            if (arrival && (!departure || departure.lat !== arrival.lat || departure.lon !== arrival.lon)) route.push(arrival);
            return route;
        }

        function parsePosition(item) {
            if (!item) return null;
            const lat = firstDefined(item.latitude, item.lat);
            const lon = firstDefined(item.longitude, item.lng, item.lon);
            const parsedLat = Number(lat);
            const parsedLon = Number(lon);
            return Number.isFinite(parsedLat) && Number.isFinite(parsedLon) && Math.abs(parsedLat) <= 90 && Math.abs(parsedLon) <= 180
                ? { lat: parsedLat, lon: parsedLon }
                : null;
        }

        function firstDefined(...values) {
            return values.find((value) => value !== undefined && value !== null && value !== "");
        }

        function formatValue(value, fallback = "N/A") {
            return value === undefined || value === null || value === "" ? fallback : value;
        }

        function escapeHtml(value) {
            return String(formatValue(value, ""))
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
