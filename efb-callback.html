<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPF EFB - Auth Callback</title>
    <style>
        :root {
            --red: #d71920;
            --yellow: #ffc400;
            --white: #ffffff;
            --muted: rgba(255,255,255,0.68);
            --line: rgba(255,255,255,0.16);
            --panel: rgba(4, 7, 12, 0.78);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #05080d;
            color: var(--white);
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0;
        }

        .screen {
            position: relative;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 48px 24px;
            background-image:
                linear-gradient(90deg, rgba(1,3,7,0.92), rgba(1,3,7,0.72) 42%, rgba(1,3,7,0.16)),
                url("assets/login-tablet-bg.jpg");
            background-size: cover;
            background-position: center;
        }

        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: rgba(0,0,0,0.58);
            border-bottom: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.78);
            font-size: 11px;
            z-index: 3;
        }

        .status-right {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .signal {
            display: inline-flex;
            align-items: end;
            gap: 2px;
            height: 12px;
        }

        .signal span {
            width: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.82);
        }

        .signal span:nth-child(1) { height: 4px; }
        .signal span:nth-child(2) { height: 7px; }
        .signal span:nth-child(3) { height: 10px; }
        .signal span:nth-child(4) {
            height: 12px;
            background: rgba(255,255,255,0.38);
        }

        .auth-panel {
            width: min(460px, 94vw);
            display: grid;
            justify-items: center;
            gap: 18px;
            padding: 42px 38px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(3,6,11,0.86), rgba(3,6,11,0.74));
            box-shadow: 0 24px 70px rgba(0,0,0,0.38);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .logo {
            width: min(300px, 86%);
            max-height: 116px;
            object-fit: contain;
            filter: drop-shadow(0 14px 26px rgba(0,0,0,0.34));
        }

        .loader {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.18);
            border-top-color: var(--yellow);
            border-right-color: var(--red);
            animation: spin 0.9s linear infinite;
        }

        .auth-panel.failed .loader {
            border-color: rgba(215,25,32,0.42);
            animation: none;
        }

        .auth-panel.failed .loader::after {
            content: "!";
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
            color: var(--yellow);
            font-size: 28px;
            font-weight: 800;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.05;
        }

        .subtitle {
            max-width: 330px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.45;
        }

        .accent {
            width: 210px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--red) 0 46%, var(--yellow) 46% 58%, var(--red) 58% 100%);
        }

        .home-link {
            display: none;
            min-width: 210px;
            min-height: 48px;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--red), #ef3c18 48%, var(--yellow));
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 800;
        }

        .auth-panel.failed .home-link {
            display: inline-flex;
        }

        pre {
            display: none;
            width: 100%;
            max-height: 210px;
            overflow: auto;
            padding: 16px;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
            line-height: 1.45;
            color: rgba(255,255,255,0.74);
            background: rgba(0,0,0,0.24);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 14px;
        }

        @media (max-width: 640px) {
            .screen {
                align-items: end;
                padding: 56px 18px 28px;
                background-image:
                    linear-gradient(180deg, rgba(1,3,7,0.12), rgba(1,3,7,0.78) 52%, rgba(1,3,7,0.96)),
                    url("assets/login-mobile-bg.jpg");
            }

            .auth-panel {
                padding: 32px 24px;
                border-radius: 18px;
            }

            .logo {
                width: min(260px, 86%);
            }
        }
    </style>
</head>
<body>
    <main class="screen">
        <div class="status-bar" aria-hidden="true">
            <span id="utcTime">--:-- UTC</span>
            <span>HISPAFLY EFB</span>
            <span class="status-right">
                <span class="signal">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span>100%</span>
            </span>
        </div>
        <section class="auth-panel" id="authPanel">
            <img class="logo" src="assets/hispafly-logo-white.png" alt="HISPAFLY">
            <div class="loader" aria-hidden="true"></div>
            <div class="accent"></div>
            <h1 id="msg">Verifying VAMSYS Login...</h1>
            <p class="subtitle" id="subtitle">Please keep this page open while your pilot authorization is confirmed.</p>
            <a class="home-link" href="index.html">RETURN TO EFB LOGIN</a>
            <pre id="details"></pre>
        </section>
    </main>
    <script>
        console.log("===== Callback Script Start =====");
        const CLIENT_ID = "909";
        const TOKEN_URL = "/api/token-proxy";
        const panelDom = document.getElementById("authPanel");
        const msgDom = document.getElementById("msg");
        const subtitleDom = document.getElementById("subtitle");
        const detailsDom = document.getElementById("details");

        function updateUtcTime() {
            const now = new Date();
            const hours = String(now.getUTCHours()).padStart(2, "0");
            const minutes = String(now.getUTCMinutes()).padStart(2, "0");
            document.getElementById("utcTime").textContent = `${hours}:${minutes} UTC`;
        }
        updateUtcTime();
        setInterval(updateUtcTime, 30000);

        const urlParams = new URLSearchParams(location.search);
        const authCode = urlParams.get("code");
        const returnState = urlParams.get("state");
        const oauthError = urlParams.get("error");
        const oauthErrorDescription = urlParams.get("error_description");
        console.log("URL code:", authCode);
        console.log("URL state:", returnState);

        function getStoredValue(key) {
            return sessionStorage.getItem(key) || localStorage.getItem(key) || "";
        }
        function fail(message, details = "") {
            console.error(message, details);
            panelDom.classList.add("failed");
            msgDom.textContent = message;
            subtitleDom.textContent = "The authorization request could not be completed. Return to the login screen and start again.";
            if (details) {
                detailsDom.style.display = "block";
                detailsDom.textContent = details;
            }
        }

        const savedState = getStoredValue("pkce_s");
        const savedVerifier = getStoredValue("pkce_v");
        const redirectUri = getStoredValue("oauth_redirect_uri") || `${window.location.origin}/efb-callback.html`;
        console.log("Loaded state:", savedState);
        console.log("Loaded verifier:", savedVerifier ? "present" : "missing");
        console.log("Redirect URI:", redirectUri);

        if (oauthError) {
            fail("Login Failed", `${oauthError}\n${oauthErrorDescription || ""}`.trim());
        } else if (!returnState || returnState !== savedState) {
            fail("Login Failed", "State mismatch. Please start the login again from this same site URL.");
        } else if (!authCode || !savedVerifier) {
            fail("Login Failed", "Missing authorization code or PKCE verifier. Please start the login again.");
        } else {
            console.log("Validation passed, request token via proxy");
            fetch(TOKEN_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    grant_type: "authorization_code",
                    client_id: CLIENT_ID,
                    redirect_uri: redirectUri,
                    code: authCode,
                    code_verifier: savedVerifier
                })
            }).then(async res => {
                console.log("Proxy response status:", res.status);
                const text = await res.text();
                let data = {};
                try {
                    data = JSON.parse(text);
                } catch (err) {
                    throw new Error(`Token proxy returned non-JSON: ${text.slice(0, 600)}`);
                }
                if (!res.ok) {
                    throw new Error(JSON.stringify(data, null, 2));
                }
                if (!data.access_token) {
                    throw new Error(`Token response did not include access_token: ${JSON.stringify(data, null, 2)}`);
                }
                console.log("Get access_token success");
                localStorage.setItem("vamsys_token", data.access_token);
                sessionStorage.clear();
                localStorage.removeItem("pkce_s");
                localStorage.removeItem("pkce_v");
                localStorage.removeItem("oauth_redirect_uri");
                window.location.href = "dashboard.html";
            }).catch(err => {
                fail("Login Failed", `Token exchange failed:\n${err.message || err}`);
            });
        }
    </script>
</body>
</html>
