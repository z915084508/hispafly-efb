<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPF EFB - Auth Callback</title>
    <style>
        body {
            background:#3a2413;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            font-size:18px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div id="tip">Verifying VAMSYS Login...</div>
    <script>
        const CLIENT_ID = "909";
        const REDIRECT_URI = "https://hispafly-94hskuxui-hispafly-efb.vercel.app/efb-callback.html";
        // 本地代理地址，解决CORS跨域
        const TOKEN_URL = "/api/vamsys-token";
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code");
        const stateReturn = urlParams.get("state");

        // 双重读取备份，防止session丢失
        const savedState = sessionStorage.getItem("oauth_state") || localStorage.getItem("oauth_state");
        const codeVerifier = sessionStorage.getItem("code_verifier") || localStorage.getItem("code_verifier");
        const tipBox = document.getElementById("tip");

        if(!stateReturn || stateReturn !== savedState) {
            tipBox.innerText = "Login Failed: CSRF State Mismatch, Return to Login";
            setTimeout(()=>window.location.href="index.html",2500);
        } else if(!code || !codeVerifier) {
            tipBox.innerText = "Login Failed: Missing PKCE Data, Retry Login";
            setTimeout(()=>window.location.href="index.html",2500);
        } else {
            fetch(TOKEN_URL, {
                method:"POST",
                headers:{"Content-Type":"application/x-www-form-urlencoded"},
                body: new URLSearchParams({
                    grant_type:"authorization_code",
                    client_id:CLIENT_ID,
                    redirect_uri:REDIRECT_URI,
                    code:code,
                    code_verifier:codeVerifier
                })
            }).then(async res=>{
                if(!res.ok) {
                    const errText = await res.text();
                    throw new Error(`Request error ${res.status}: ${errText}`);
                }
                return res.json();
            }).then(data=>{
                // 持久存储access_token
                localStorage.setItem("vamsys_token", data.access_token);
                // 清理临时缓存
                sessionStorage.removeItem("code_verifier");
                sessionStorage.removeItem("oauth_state");
                localStorage.removeItem("code_verifier");
                localStorage.removeItem("oauth_state");
                // 跳转仪表盘
                window.location.href = "dashboard.html";
            }).catch(err=>{
                tipBox.innerText = `Verify Failed: ${err.message}\nRedirecting to login...`;
                setTimeout(()=>window.location.href="index.html",4000);
            })
        }
    </script>
</body>
</html>
