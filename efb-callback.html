<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPF EFB - Auth Callback</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            font-size: 32px;
        }
        a {
            color: #0066cc;
        }
    </style>
</head>
<body>
    <h2 id="msg">Verifying VAMSYS Login...</h2>
    <script>
        const CLIENT_ID = "909";
        const REDIRECT_URI = "https://hispafly-94hskuxui-hispafly-efb.vercel.app/efb-callback.html";
        const TOKEN_URL = "/api/token-proxy";
        const msgDom = document.getElementById("msg");

        // 1. 拆分URL
        const fullUrl = new URL(location.href);
        const searchParams = new URLSearchParams(fullUrl.search);
        const hashParams = new URLSearchParams(fullUrl.hash.replace("#", ""));

        const authCode = searchParams.get("code");
        const urlState = searchParams.get("state");
        const savedVerifier = decodeURIComponent(hashParams.get("v") || "");
        const savedState = decodeURIComponent(hashParams.get("s") || "");

        console.log("code:", authCode);
        console.log("url state:", urlState);
        console.log("hash verifier:", savedVerifier);
        console.log("hash state:", savedState);

        // 校验1：state匹配
        if (!urlState || urlState !== savedState) {
            msgDom.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
        }
        // 校验2：缺少code或verifier
        else if (!authCode || !savedVerifier) {
            msgDom.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
        }
        // 交换Token
        else {
            fetch(TOKEN_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    grant_type: "authorization_code",
                    client_id: CLIENT_ID,
                    redirect_uri: REDIRECT_URI,
                    code: authCode,
                    code_verifier: savedVerifier
                })
            }).then(async res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                localStorage.setItem("vamsys_token", data.access_token);
                window.location.href = "dashboard.html";
            }).catch(err => {
                console.error(err);
                msgDom.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
            })
        }
    </script>
</body>
</html>
