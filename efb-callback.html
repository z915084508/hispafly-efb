<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPF EFB - Auth Callback</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            font-size: 32px;
        }
        a {
            color: #0066cc;
        }
    </style>
</head>
<body>
    <h2 id="msg">Verifying VAMSYS Login...</h2>
    <script>
        const CLIENT_ID = "909";
        const REDIRECT_URI = "https://hispafly-94hskuxui-hispafly-efb.vercel.app/efb-callback.html";
        const TOKEN_URL = "/api/token-proxy";
        const msgDom = document.getElementById("msg");

        const urlParams = new URLSearchParams(location.search);
        const authCode = urlParams.get("code");
        const returnState = urlParams.get("state");

        // 读取登录页存入的PKCE与state
        const savedState = sessionStorage.getItem("pkce_s");
        const savedVerifier = sessionStorage.getItem("pkce_v");

        // 校验逻辑
        if (!returnState || returnState !== savedState) {
            msgDom.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
        } else if (!authCode || !savedVerifier) {
            msgDom.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
        } else {
            // 后端代理交换token
            fetch(TOKEN_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({
                    grant_type: "authorization_code",
                    client_id: CLIENT_ID,
                    redirect_uri: REDIRECT_URI,
                    code: authCode,
                    code_verifier: savedVerifier
                })
            }).then(async res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                localStorage.setItem("vamsys_token", data.access_token);
                // 清理临时session缓存
                sessionStorage.removeItem("pkce_s");
                sessionStorage.removeItem("pkce_v");
                window.location.href = "dashboard.html";
            }).catch(err => {
                console.error("Token exchange error:", err);
                msgDom.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
            })
        }
    </script>
</body>
</html>
