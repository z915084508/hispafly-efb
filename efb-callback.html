<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPF EFB - Auth Callback</title>
    <style>
        body {
            background:#fff;
            color:#000;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            font-size:32px;
            text-align:center;
        }
        a {
            color:#0066cc;
        }
    </style>
</head>
<body>
    <div id="msgBox">Verifying VAMSYS Login...</div>
    <script>
        const CLIENT_ID = "909";
        const REDIRECT_URI = "https://hispafly-94hskuxui-hispafly-efb.vercel.app/efb-callback.html";
        // 使用Vercel代理解决CORS跨域
        const TOKEN_URL = "/api/vamsys-token";
        const urlParams = new URLSearchParams(window.location.search);
        const authCode = urlParams.get("code");
        const returnState = urlParams.get("state");

        // 双存储读取，防止session丢失
        const savedState = sessionStorage.getItem("oauth_state") || localStorage.getItem("oauth_state");
        const codeVerifier = sessionStorage.getItem("code_verifier") || localStorage.getItem("code_verifier");
        const msgBox = document.getElementById("msgBox");

        // 1. CSRF state 校验失败
        if (!returnState || returnState !== savedState) {
            msgBox.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
            return;
        }
        // 2. PKCE verifier 丢失
        if (!authCode || !codeVerifier) {
            msgBox.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
            return;
        }

        // 3. 发起代理Token交换请求
        fetch(TOKEN_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({
                grant_type: "authorization_code",
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                code: authCode,
                code_verifier: codeVerifier
            })
        }).then(async res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            // 保存登录凭证
            localStorage.setItem("vamsys_token", data.access_token);
            // 清理临时缓存
            sessionStorage.clear();
            localStorage.removeItem("oauth_state");
            localStorage.removeItem("code_verifier");
            // 跳转仪表盘
            window.location.href = "dashboard.html";
        }).catch(err => {
            // 跨域/接口错误统一捕获，显示失败页面
            msgBox.innerHTML = `Login Failed, Return to <a href="index.html">EFB Home</a>`;
        })
    </script>
</body>
</html>
