<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HISPAFLY EFB - Pilot Login</title>
    <style>
        :root {
            --red: #d71920;
            --yellow: #ffc400;
            --ink: #07111f;
            --white: #ffffff;
            --muted: rgba(255,255,255,0.72);
            --panel: rgba(4, 7, 12, 0.74);
            --panel-strong: rgba(2, 4, 8, 0.86);
            --line: rgba(255,255,255,0.18);
            --shadow: 0 24px 80px rgba(0,0,0,0.42);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #05080d;
            color: var(--white);
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            display: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            display: none;
        }

        .stage {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 0;
        }

        .device {
            width: 100vw;
            min-height: 100vh;
            background: #05080d;
        }

        .screen {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
            background-image:
                linear-gradient(90deg, rgba(1,3,7,0.88) 0%, rgba(1,3,7,0.70) 38%, rgba(1,3,7,0.16) 39%, rgba(1,3,7,0.04) 100%),
                url("assets/login-tablet-bg.jpg");
            background-size: cover;
            background-position: center;
        }

        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: rgba(0,0,0,0.56);
            color: rgba(255,255,255,0.78);
            border-bottom: 1px solid rgba(255,255,255,0.10);
            font-size: 11px;
        }

        .status-right {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .signal {
            display: inline-flex;
            align-items: end;
            gap: 2px;
            height: 12px;
        }

        .signal span {
            width: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.82);
        }

        .signal span:nth-child(1) {
            height: 4px;
        }

        .signal span:nth-child(2) {
            height: 7px;
        }

        .signal span:nth-child(3) {
            height: 10px;
        }

        .signal span:nth-child(4) {
            height: 12px;
            background: rgba(255,255,255,0.38);
        }

        .login-panel {
            position: absolute;
            top: 28px;
            bottom: 0;
            left: 0;
            width: min(520px, 42vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 56px 58px;
            background: linear-gradient(180deg, rgba(1,3,7,0.86), rgba(1,3,7,0.78));
            border-right: 1px solid var(--line);
            backdrop-filter: blur(10px);
        }

        .logo {
            width: min(320px, 82%);
            max-height: 128px;
            object-fit: contain;
            margin-bottom: 26px;
            filter: drop-shadow(0 14px 26px rgba(0,0,0,0.32));
        }

        .mobile-title {
            display: none;
        }

        .subtitle {
            color: var(--muted);
            font-size: 17px;
            line-height: 1.4;
            text-align: center;
            margin-bottom: 28px;
        }

        .accent {
            width: 210px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--red) 0 46%, var(--yellow) 46% 58%, var(--red) 58% 100%);
            margin-bottom: 34px;
        }

        .login-btn {
            width: min(300px, 100%);
            min-height: 52px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--red), #ef3c18 48%, var(--yellow));
            color: var(--white);
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 14px 28px rgba(215,25,32,0.25);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(215,25,32,0.34);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .footer-note {
            position: absolute;
            left: 48px;
            bottom: 30px;
            color: rgba(255,255,255,0.44);
            font-size: 11px;
        }

        @media (max-width: 900px) {
            .device {
                min-height: 100vh;
            }

            .login-panel {
                width: 48vw;
                padding: 34px 32px;
            }

            .logo {
                width: min(280px, 88%);
                margin-bottom: 22px;
            }

            .subtitle {
                font-size: 15px;
            }
        }

        @media (max-width: 720px) {
            body {
                overflow: auto;
            }

            body::before {
                display: block;
                background-image: url("assets/login-mobile-bg.jpg");
                background-size: cover;
                background-position: center top;
                transform: scale(1.01);
            }

            body::after {
                display: block;
                background:
                    linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.18) 38%, rgba(0,0,0,0.86) 100%),
                    linear-gradient(90deg, rgba(0,0,0,0.08), rgba(0,0,0,0.12));
            }

            .stage {
                min-height: 100svh;
                align-items: end;
                padding: 18px;
            }

            .device {
                width: 100%;
                max-height: none;
                aspect-ratio: auto;
                border: 0;
                border-radius: 0;
                padding: 0;
                background: transparent;
                box-shadow: none;
            }

            .screen {
                min-height: calc(100svh - 36px);
                overflow: visible;
                border: 0;
                border-radius: 0;
                background: transparent;
            }

            .status-bar {
                display: none;
            }

            .login-panel {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                top: auto;
                width: 100%;
                min-height: 318px;
                justify-content: flex-end;
                padding: 28px 24px 30px;
                border: 1px solid rgba(255,255,255,0.14);
                border-radius: 26px;
                background: linear-gradient(180deg, rgba(4,7,12,0.78), rgba(2,4,8,0.92));
                box-shadow: 0 -18px 54px rgba(0,0,0,0.32);
            }

            .logo {
                width: min(290px, 82vw);
                max-height: 92px;
                margin-bottom: 18px;
            }

            .mobile-title {
                display: block;
                font-size: clamp(34px, 10vw, 46px);
                line-height: 1;
                font-weight: 800;
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 20px;
            }

            .accent {
                width: min(210px, 60vw);
                margin-bottom: 24px;
            }

            .login-btn {
                width: 100%;
                min-height: 54px;
                font-size: 16px;
            }

            .footer-note {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="stage">
        <section class="device" aria-label="HISPAFLY EFB login">
            <div class="screen">
                <div class="status-bar" aria-hidden="true">
                    <span id="utcTime">--:-- UTC</span>
                    <span>HISPAFLY EFB</span>
                    <span class="status-right">
                        <span class="signal">
                            <span></span>
                            <span></span>
                            <span></span>
                            <span></span>
                        </span>
                        <span>100%</span>
                    </span>
                </div>

                <div class="login-panel">
                    <img class="logo" alt="HISPAFLY" src="assets/hispafly-logo-white.png">
                    <h1 class="mobile-title">HISPAFLY</h1>
                    <p class="subtitle">Electronic Flight Bag</p>
                    <div class="accent" aria-hidden="true"></div>
                    <button class="login-btn" id="loginBtn">Login with VAMSYS</button>
                    <p class="footer-note">Pilot access powered by VAMSYS</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const CLIENT_ID = "909";
        const REDIRECT_URI = "https://hispafly-efb.vercel.app/efb-callback.html";
        const VAMSYS_AUTH_ENDPOINT = "https://vamsys.io/oauth/authorize";
        const SCOPE_LIST = "identity:basic identity:networks pilot:read pilot:write flights:read activities:read";

        function updateUtcTime() {
            const now = new Date();
            const hours = String(now.getUTCHours()).padStart(2, "0");
            const minutes = String(now.getUTCMinutes()).padStart(2, "0");
            document.getElementById("utcTime").textContent = `${hours}:${minutes} UTC`;
        }

        updateUtcTime();
        setInterval(updateUtcTime, 30000);

        function generateState() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
            let state = "";
            for (let i = 0; i < 32; i++) state += chars[Math.floor(Math.random() * chars.length)];
            return state;
        }

        function generateCodeVerifier() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
            let verifier = "";
            for (let i = 0; i < 64; i++) verifier += chars[Math.floor(Math.random() * chars.length)];
            return verifier;
        }

        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const bytes = encoder.encode(verifier);
            const sha256 = await crypto.subtle.digest("SHA-256", bytes);
            return btoa(String.fromCharCode(...new Uint8Array(sha256)))
                .replace(/\+/g, "-")
                .replace(/\//g, "_")
                .replace(/=/g, "");
        }

        document.getElementById("loginBtn").addEventListener("click", async () => {
            const state = generateState();
            const verifier = generateCodeVerifier();
            sessionStorage.setItem("pkce_s", state);
            localStorage.setItem("pkce_s", state);
            sessionStorage.setItem("pkce_v", verifier);
            localStorage.setItem("pkce_v", verifier);
            sessionStorage.setItem("oauth_redirect_uri", REDIRECT_URI);
            localStorage.setItem("oauth_redirect_uri", REDIRECT_URI);

            const params = new URLSearchParams({
                response_type: "code",
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                scope: SCOPE_LIST,
                state: state,
                code_challenge: await generateCodeChallenge(verifier),
                code_challenge_method: "S256"
            });
            window.location.href = `${VAMSYS_AUTH_ENDPOINT}?${params.toString()}`;
        });
    </script>
</body>
</html>
