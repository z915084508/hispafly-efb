<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HISPAFLY EFB | OFP</title>
    <style>
        :root {
            --red: #d71920;
            --yellow: #ffc400;
            --line: rgba(255,255,255,0.14);
            --muted: rgba(255,255,255,0.66);
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #05080d;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(1,3,7,0.96) 0%, rgba(1,3,7,0.86) 35%, rgba(1,3,7,0.54) 100%),
                url("assets/login-tablet-bg.jpg");
            background-size: cover;
            background-position: center;
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            grid-template-rows: 30px 1fr;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            background: rgba(0,0,0,0.56);
            border-bottom: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.78);
            font-size: 11px;
        }

        .status-right,
        .signal {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .signal {
            align-items: end;
            gap: 2px;
            height: 12px;
        }

        .signal span {
            width: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.82);
        }

        .signal span:nth-child(1) { height: 4px; }
        .signal span:nth-child(2) { height: 7px; }
        .signal span:nth-child(3) { height: 10px; }
        .signal span:nth-child(4) { height: 12px; background: rgba(255,255,255,0.38); }

        .layout {
            min-height: calc(100vh - 30px);
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
        }

        .sidebar {
            padding: 26px 18px;
            border-right: 1px solid var(--line);
            background: rgba(1,3,7,0.82);
            backdrop-filter: blur(12px);
        }

        .logo {
            width: 220px;
            display: block;
            margin-bottom: 26px;
        }

        .back,
        .attach {
            width: 100%;
            min-height: 42px;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 999px;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.06);
            cursor: pointer;
        }

        .attach {
            border: 0;
            background: linear-gradient(90deg, var(--red), #ef3c18 48%, var(--yellow));
            margin-top: 10px;
        }

        .field {
            display: grid;
            gap: 7px;
            margin-top: 18px;
        }

        .field label {
            color: rgba(255,255,255,0.78);
            font-size: 12px;
            font-weight: 800;
        }

        input {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 12px;
            background: rgba(0,0,0,0.28);
            color: #fff;
            padding: 11px 12px;
            font: inherit;
        }

        .main {
            min-width: 0;
            height: calc(100vh - 30px);
            padding: 24px;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 18px;
            margin-bottom: 16px;
        }

        .signature-toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .signature-btn {
            min-height: 40px;
            padding: 0 16px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }

        .signature-btn.primary {
            border: 0;
            background: linear-gradient(90deg, var(--red), #ef3c18 52%, var(--yellow));
        }

        .signature-btn.active {
            color: #07111f;
            background: var(--yellow);
            border-color: var(--yellow);
        }

        .signature-btn:disabled {
            opacity: 0.38;
            cursor: default;
        }

        .eyebrow {
            color: var(--yellow);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-size: clamp(30px, 3vw, 44px);
            line-height: 1;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
            margin-top: 8px;
        }

        .viewer {
            position: relative;
            height: calc(100vh - 142px);
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(4,7,12,0.62);
            box-shadow: 0 24px 80px rgba(0,0,0,0.38);
            overflow: auto;
            padding: 18px;
            backdrop-filter: blur(14px);
        }

        .signature-canvas {
            position: absolute;
            inset: 0;
            z-index: 4;
            width: 100%;
            height: 100%;
            pointer-events: none;
            touch-action: none;
        }

        .signature-canvas.drawing {
            pointer-events: auto;
            cursor: crosshair;
            box-shadow: inset 0 0 0 2px rgba(255,196,0,0.9);
        }

        .signature-status {
            position: absolute;
            left: 32px;
            bottom: 30px;
            z-index: 5;
            max-width: calc(100% - 64px);
            padding: 8px 12px;
            border-radius: 6px;
            background: rgba(5,8,13,0.88);
            color: rgba(255,255,255,0.82);
            font-size: 11px;
            font-weight: 700;
            pointer-events: none;
        }

        .pdf-frame {
            width: 100%;
            height: 100%;
            min-height: calc(100vh - 180px);
            border: 0;
            border-radius: 14px;
            background: #fff;
        }

        .pdf-document {
            display: grid;
            gap: 14px;
            width: 100%;
            max-width: 1120px;
            margin: 0 auto;
        }

        .pdf-page {
            position: relative;
            width: 100%;
            background: #fff;
            box-shadow: 0 8px 26px rgba(0,0,0,0.32);
        }

        .pdf-page > canvas:not(.signature-canvas) {
            display: block;
            width: 100%;
            height: auto;
        }

        .pdf-loading {
            min-height: 240px;
            display: grid;
            place-items: center;
            color: var(--muted);
            font-weight: 700;
        }

        .ofp-sheet {
            position: relative;
            max-width: 1040px;
            min-height: 100%;
            margin: 0 auto;
            border-radius: 12px;
            padding: 28px;
            background: #f4f1e8;
            color: #111;
            font-family: "Courier New", monospace;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
        }

        .ofp-title {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 3px solid #111;
            padding-bottom: 12px;
            margin-bottom: 18px;
        }

        .ofp-title h2 {
            font-size: 30px;
        }

        .ofp-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 18px;
        }

        .ofp-box {
            border: 1px solid #222;
            padding: 9px;
            min-height: 62px;
        }

        .ofp-box span {
            display: block;
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .ofp-box strong {
            display: block;
            color: #111;
            font-size: 16px;
        }

        .ofp-section {
            border-top: 1px solid #222;
            padding-top: 13px;
            margin-top: 13px;
        }

        .ofp-section h3 {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .ofp-pre {
            white-space: pre-wrap;
            color: #111;
            line-height: 1.45;
            font-size: 13px;
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 820px) {
            body {
                overflow: auto;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .main {
                height: auto;
                min-height: 70svh;
            }

            .header {
                align-items: flex-start;
                flex-direction: column;
            }

            .signature-toolbar {
                width: 100%;
                justify-content: flex-start;
            }

            .viewer {
                height: auto;
                min-height: 70svh;
            }

            .ofp-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="status-bar" aria-hidden="true">
            <span id="utcTime">--:-- UTC</span>
            <span>HISPAFLY EFB</span>
            <span class="status-right">
                <span class="signal"><span></span><span></span><span></span><span></span></span>
                <span>100%</span>
            </span>
        </div>

        <div class="layout">
            <aside class="sidebar">
                <img class="logo" src="assets/hispafly-logo-white.png" alt="HISPAFLY">
                <a class="back" href="dashboard.html">BACK TO DASHBOARD</a>
                <div class="field">
                    <label for="dispatchIdInput">SimBrief dispatch_id / request_id / static_id</label>
                    <input id="dispatchIdInput" autocomplete="off" placeholder="Paste SimBrief dispatch ID">
                </div>
                <button class="attach" id="attachBtn">ATTACH OFP</button>
                <p class="muted">If vAMSYS returns pdf_url, this page displays the PDF directly.</p>
            </aside>

            <section class="main">
                <div class="header">
                    <div>
                        <div class="eyebrow">OFP</div>
                        <h1 id="pageTitle">SimBrief OFP</h1>
                        <p class="muted" id="pageSubtitle">Loading operational flight plan...</p>
                    </div>
                    <div class="signature-toolbar" id="signatureToolbar" hidden>
                        <button class="signature-btn primary" id="signOfpBtn" type="button">SIGN OFP</button>
                        <button class="signature-btn" id="undoSignatureBtn" type="button" disabled>UNDO</button>
                        <button class="signature-btn" id="clearSignatureBtn" type="button" disabled>CLEAR</button>
                        <button class="signature-btn" id="saveSignatureBtn" type="button" disabled>SAVE SIGNATURE</button>
                    </div>
                </div>
                <div class="viewer" id="viewer">
                    <p class="muted">Loading OFP...</p>
                </div>
            </section>
        </div>
    </main>

    <script src="assets/reference-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" referrerpolicy="no-referrer"></script>
    <script>
        const API_ROOT = "https://vamsys.io/api/v3/pilot";
        const accessToken = localStorage.getItem("vamsys_token");
        const bookingId = new URLSearchParams(window.location.search).get("booking");
        const signatureLayers = new Map();
        let signatureStrokes = [];
        let activeStroke = null;
        let signatureDrawing = false;
        let signedAt = null;
        let signerName = "HISPAFLY Pilot";

        if (!accessToken) window.location.href = "index.html";
        if (!bookingId) window.location.href = "dashboard.html";

        const authHeader = {
            "Authorization": `Bearer ${accessToken}`,
            "Accept": "application/json"
        };

        window.addEventListener("DOMContentLoaded", () => {
            updateUtcTime();
            setInterval(updateUtcTime, 30000);
            document.getElementById("attachBtn").addEventListener("click", attachSimbrief);
            setupSignatureControls();
            loadOfp();
        });

        function updateUtcTime() {
            const now = new Date();
            document.getElementById("utcTime").textContent =
                `${String(now.getUTCHours()).padStart(2, "0")}:${String(now.getUTCMinutes()).padStart(2, "0")} UTC`;
        }

        async function fetchPilotJson(path, params = {}, options = {}) {
            const url = new URL(`${API_ROOT}${path}`);
            Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
            const res = await fetch(url, {
                method: options.method || "GET",
                headers: {
                    ...authHeader,
                    ...(options.body ? { "Content-Type": "application/json" } : {})
                },
                body: options.body ? JSON.stringify(options.body) : undefined
            });
            const text = await res.text();
            const json = text ? JSON.parse(text) : { data: null };
            if (!res.ok) {
                const msg = json.message || json.error || JSON.stringify(json).slice(0, 180);
                throw new Error(`VAMSYS ${path} failed (HTTP ${res.status}): ${msg}`);
            }
            return json;
        }

        async function loadOfp() {
            const viewer = document.getElementById("viewer");
            viewer.innerHTML = `<p class="muted">Loading OFP for booking ${escapeHtml(bookingId)}...</p>`;
            try {
                const [bookingResult, ofpResult, userResult] = await Promise.allSettled([
                    fetchPilotJson(`/bookings/${bookingId}`),
                    fetchPilotJson(`/bookings/${bookingId}/simbrief`),
                    fetchPilotJson("/user")
                ]);
                const booking = bookingResult.status === "fulfilled" ? (bookingResult.value.data || {}) : {};
                if (userResult.status === "fulfilled") {
                    signerName = formatPilotName(userResult.value.data || {});
                }
                if (booking.flight_number || booking.callsign) {
                    document.getElementById("pageTitle").textContent = `${formatValue(booking.flight_number, "Flight")} ${formatValue(booking.callsign, "")}`.trim();
                    document.getElementById("pageSubtitle").textContent = `${formatRoute(booking)} | ${formatAircraft(booking)}`;
                }
                if (ofpResult.status === "fulfilled") {
                    renderOfp(ofpResult.value.data || ofpResult.value, booking);
                } else {
                    viewer.innerHTML = `<p class="error">${escapeHtml(ofpResult.reason.message)}</p>`;
                }
            } catch (err) {
                viewer.innerHTML = `<p class="error">${escapeHtml(err.message)}</p>`;
            }
        }

        async function attachSimbrief() {
            const dispatchId = document.getElementById("dispatchIdInput").value.trim();
            const viewer = document.getElementById("viewer");
            if (!dispatchId) {
                viewer.innerHTML = `<p class="error">dispatch_id is required.</p>`;
                return;
            }
            viewer.innerHTML = `<p class="muted">Attaching SimBrief OFP...</p>`;
            try {
                const json = await fetchPilotJson(`/bookings/${bookingId}/simbrief`, {}, {
                    method: "PUT",
                    body: { dispatch_id: dispatchId }
                });
                renderOfp(json.data || json, {});
            } catch (err) {
                viewer.innerHTML = `<p class="error">${escapeHtml(err.message)}</p>`;
            }
        }

        function renderOfp(data, booking) {
            const viewer = document.getElementById("viewer");
            const pdfUrl = data?.pdf_url || data?.ofp_data?.pdf_url;
            if (pdfUrl) {
                renderPdfDocument(pdfUrl);
                return;
            }
            viewer.innerHTML = renderLidoOfp(data, booking);
            enableSignatureLayer();
        }

        async function renderPdfDocument(pdfUrl) {
            const viewer = document.getElementById("viewer");
            viewer.innerHTML = `<div class="pdf-loading">Preparing SimBrief OFP...</div>`;
            try {
                if (!window.pdfjsLib) throw new Error("The embedded PDF viewer could not be loaded.");
                window.pdfjsLib.GlobalWorkerOptions.workerSrc =
                    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
                const source = `/api/pdf-proxy?url=${encodeURIComponent(pdfUrl)}`;
                const pdf = await window.pdfjsLib.getDocument(source).promise;
                const documentHost = document.createElement("div");
                documentHost.className = "pdf-document";
                viewer.replaceChildren(documentHost);

                for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
                    const page = await pdf.getPage(pageNumber);
                    const baseViewport = page.getViewport({ scale: 1 });
                    const availableWidth = Math.max(320, Math.min(1060, viewer.clientWidth - 40));
                    const scale = availableWidth / baseViewport.width;
                    const viewport = page.getViewport({ scale });
                    const pixelRatio = Math.min(2, window.devicePixelRatio || 1);
                    const pageElement = document.createElement("div");
                    pageElement.className = "pdf-page";
                    pageElement.dataset.page = String(pageNumber);
                    const canvas = document.createElement("canvas");
                    canvas.width = Math.floor(viewport.width * pixelRatio);
                    canvas.height = Math.floor(viewport.height * pixelRatio);
                    canvas.style.aspectRatio = `${viewport.width} / ${viewport.height}`;
                    pageElement.appendChild(canvas);
                    documentHost.appendChild(pageElement);
                    await page.render({
                        canvasContext: canvas.getContext("2d"),
                        viewport,
                        transform: pixelRatio === 1 ? null : [pixelRatio, 0, 0, pixelRatio, 0, 0]
                    }).promise;
                }

                enableSignatureLayer();
            } catch (err) {
                viewer.innerHTML = `
                    <div class="pdf-loading">
                        <div>
                            <p class="error">${escapeHtml(err.message)}</p>
                            <p class="muted">The OFP could not be rendered inside this device.</p>
                        </div>
                    </div>`;
            }
        }

        function setupSignatureControls() {
            document.getElementById("signOfpBtn").addEventListener("click", toggleSignatureMode);
            document.getElementById("undoSignatureBtn").addEventListener("click", () => {
                signatureStrokes.pop();
                signedAt = null;
                redrawSignature();
                updateSignatureControls();
            });
            document.getElementById("clearSignatureBtn").addEventListener("click", async () => {
                signatureStrokes = [];
                signedAt = null;
                localStorage.removeItem(signatureStorageKey());
                redrawSignature();
                updateSignatureControls();
                setSignatureStatus("Signature cleared.");
                try {
                    await syncSignatureRequest("DELETE");
                    setSignatureStatus("Signature cleared on all devices.");
                } catch (err) {
                    setSignatureStatus("Cleared on this device. Cloud removal will retry next time.");
                }
            });
            document.getElementById("saveSignatureBtn").addEventListener("click", saveSignature);
            window.addEventListener("resize", resizeSignatureLayers);
        }

        function enableSignatureLayer() {
            const viewer = document.getElementById("viewer");
            document.getElementById("signatureToolbar").hidden = false;
            signatureLayers.clear();
            const pages = [...viewer.querySelectorAll(".pdf-page")];
            const targets = pages.length ? pages : [...viewer.querySelectorAll(".ofp-sheet")];
            targets.forEach((target, index) => {
                const pageId = target.dataset.page || String(index + 1);
                const canvas = document.createElement("canvas");
                canvas.className = "signature-canvas";
                canvas.dataset.signaturePage = pageId;
                canvas.setAttribute("aria-label", `OFP page ${pageId} signature layer`);
                target.appendChild(canvas);
                signatureLayers.set(pageId, {
                    canvas,
                    context: canvas.getContext("2d")
                });
                bindSignatureCanvas(canvas, pageId);
            });
            loadSavedSignature();
            requestAnimationFrame(resizeSignatureLayers);
        }

        function bindSignatureCanvas(canvas, pageId) {
            canvas.addEventListener("pointerdown", (event) => {
                if (!signatureDrawing) return;
                canvas.setPointerCapture(event.pointerId);
                activeStroke = {
                    page: pageId,
                    points: [signaturePoint(event, canvas)]
                };
                signatureStrokes.push(activeStroke);
                signedAt = null;
            });
            canvas.addEventListener("pointermove", (event) => {
                if (!activeStroke || !signatureDrawing) return;
                activeStroke.points.push(signaturePoint(event, canvas));
                redrawSignaturePage(pageId);
            });
            const endStroke = () => {
                activeStroke = null;
                updateSignatureControls();
            };
            canvas.addEventListener("pointerup", endStroke);
            canvas.addEventListener("pointercancel", endStroke);
        }

        function signaturePoint(event, canvas) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (event.clientX - rect.left) / rect.width,
                y: (event.clientY - rect.top) / rect.height
            };
        }

        function toggleSignatureMode() {
            signatureDrawing = !signatureDrawing;
            signatureLayers.forEach(({ canvas }) => canvas.classList.toggle("drawing", signatureDrawing));
            const button = document.getElementById("signOfpBtn");
            button.classList.toggle("active", signatureDrawing);
            button.textContent = signatureDrawing ? "FINISH WRITING" : "SIGN OFP";
            setSignatureStatus(signatureDrawing ? "Write anywhere on this page. Finish writing to scroll to another page." : "Scroll to another page or save the signature.");
            updateSignatureControls();
        }

        function resizeSignatureLayers() {
            signatureLayers.forEach(({ canvas, context }, pageId) => {
                const rect = canvas.getBoundingClientRect();
                const scale = Math.max(1, window.devicePixelRatio || 1);
                canvas.width = Math.max(1, Math.round(rect.width * scale));
                canvas.height = Math.max(1, Math.round(rect.height * scale));
                context.setTransform(scale, 0, 0, scale, 0, 0);
                redrawSignaturePage(pageId);
            });
        }

        function redrawSignature() {
            signatureLayers.forEach((_, pageId) => redrawSignaturePage(pageId));
        }

        function redrawSignaturePage(pageId) {
            const layer = signatureLayers.get(String(pageId));
            if (!layer) return;
            const { canvas, context } = layer;
            const rect = canvas.getBoundingClientRect();
            context.clearRect(0, 0, rect.width, rect.height);
            context.strokeStyle = "#1756b8";
            context.lineWidth = 2.4;
            context.lineCap = "round";
            context.lineJoin = "round";
            signatureStrokes
                .filter((stroke) => String(stroke.page) === String(pageId))
                .forEach((stroke) => {
                if (!stroke.points?.length) return;
                context.beginPath();
                stroke.points.forEach((point, index) => {
                    const x = point.x * rect.width;
                    const y = point.y * rect.height;
                    if (index === 0) context.moveTo(x, y);
                    else context.lineTo(x, y);
                });
                context.stroke();
            });
        }

        async function saveSignature() {
            if (!signatureStrokes.length) return;
            signatureDrawing = false;
            signatureLayers.forEach(({ canvas }) => canvas.classList.remove("drawing"));
            signedAt = new Date().toISOString();
            const signature = {
                strokes: signatureStrokes,
                signedAt,
                signerName
            };
            localStorage.setItem(signatureStorageKey(), JSON.stringify(signature));
            document.getElementById("signOfpBtn").classList.remove("active");
            document.getElementById("signOfpBtn").textContent = "SIGN OFP";
            setSignatureStatus(`SIGNED BY ${signerName.toUpperCase()} | ${formatUtcTimestamp(signedAt)} | SYNCING`);
            updateSignatureControls();
            try {
                await syncSignatureRequest("PUT", signature);
                setSignatureStatus(`SIGNED BY ${signerName.toUpperCase()} | ${formatUtcTimestamp(signedAt)} | CLOUD SAVED`);
            } catch (err) {
                setSignatureStatus(`SIGNED BY ${signerName.toUpperCase()} | ${formatUtcTimestamp(signedAt)} | SAVED ON DEVICE`);
            }
        }

        async function loadSavedSignature() {
            let localSignature = null;
            try {
                const saved = JSON.parse(localStorage.getItem(signatureStorageKey()) || "null");
                if (saved?.strokes) {
                    localSignature = saved;
                    applySignatureRecord(saved, "SAVED ON DEVICE");
                }
            } catch (err) {
                console.warn("Unable to restore OFP signature", err);
            }
            updateSignatureControls();
            try {
                const response = await syncSignatureRequest("GET");
                if (response.data?.strokes) {
                    localStorage.setItem(signatureStorageKey(), JSON.stringify(response.data));
                    applySignatureRecord(response.data, "CLOUD SAVED");
                } else if (localSignature) {
                    await syncSignatureRequest("PUT", localSignature);
                    setSignatureStatus(`SIGNED BY ${signerName.toUpperCase()} | ${formatUtcTimestamp(signedAt)} | CLOUD SAVED`);
                }
            } catch (err) {
                console.info("Cloud OFP signature unavailable; local copy remains active.", err.message);
            }
        }

        function applySignatureRecord(record, sourceLabel) {
            signatureStrokes = record.strokes.map((stroke) => Array.isArray(stroke)
                ? { page: "1", points: stroke }
                : stroke);
            signedAt = record.signedAt || null;
            signerName = record.signerName || signerName;
            redrawSignature();
            updateSignatureControls();
            setSignatureStatus(`SIGNED BY ${signerName.toUpperCase()} | ${formatUtcTimestamp(signedAt)} | ${sourceLabel}`);
        }

        async function syncSignatureRequest(method, signature) {
            const response = await fetch(`/api/ofp-signature?booking=${encodeURIComponent(bookingId)}`, {
                method,
                headers: {
                    ...authHeader,
                    ...(signature ? { "Content-Type": "application/json" } : {})
                },
                body: signature ? JSON.stringify({ signature }) : undefined
            });
            const json = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(json.message || `Signature sync HTTP ${response.status}`);
            return json;
        }

        function updateSignatureControls() {
            const hasSignature = signatureStrokes.length > 0;
            document.getElementById("undoSignatureBtn").disabled = !hasSignature;
            document.getElementById("clearSignatureBtn").disabled = !hasSignature;
            document.getElementById("saveSignatureBtn").disabled = !hasSignature || signatureDrawing;
        }

        function setSignatureStatus(message) {
            let status = document.getElementById("signatureStatus");
            if (!status) {
                status = document.createElement("div");
                status.id = "signatureStatus";
                status.className = "signature-status";
                document.getElementById("viewer").appendChild(status);
            }
            status.textContent = message;
        }

        function signatureStorageKey() {
            return `hpf_ofp_signature_${bookingId}`;
        }

        function formatPilotName(user) {
            const first = user.first_name || user.firstname || user.given_name || "";
            const last = user.last_name || user.lastname || user.family_name || "";
            return [first, last].filter(Boolean).join(" ") || user.name || user.full_name || "HISPAFLY Pilot";
        }

        function formatUtcTimestamp(value) {
            if (!value) return "UTC TIME NOT RECORDED";
            const date = new Date(value);
            return `${date.toISOString().slice(0, 10)} ${date.toISOString().slice(11, 16)} UTC`;
        }

        function renderLidoOfp(raw, booking = {}) {
            const ofp = raw?.ofp_data || raw || {};
            const atc = ofp.atc || {};
            const general = ofp.general || {};
            const fuel = ofp.fuel || {};
            const times = ofp.times || {};
            const weights = ofp.weights || {};
            const navlog = ofp.navlog || {};
            const routeRef = lookupRoute(booking.route_id);
            const route = atc.route || ofp.route || navlog.route || atc.route_ifps || routeRef?.routing || booking.user_route || "N/A";
            const callsign = atc.callsign || booking.callsign || general.flight_number || "N/A";
            const origin = atc.fir_orig || atc.orig || general.origin || routeRef?.departure || formatAirport(booking, "departure");
            const dest = atc.fir_dest || atc.dest || general.destination || routeRef?.arrival || formatAirport(booking, "arrival");
            const altn = atc.altn || general.alternate || ofp.alternate || "N/A";

            return `
                <div class="ofp-sheet">
                    <div class="ofp-title">
                        <div>
                            <h2>HISPAFLY OFP</h2>
                            <p>OPERATIONAL FLIGHT PLAN / LIDO STYLE VIEW</p>
                        </div>
                        <strong>${escapeHtml(callsign)}</strong>
                    </div>
                    <div class="ofp-grid">
                        ${ofpBox("ORIGIN", origin)}
                        ${ofpBox("DEST", dest)}
                        ${ofpBox("ALTN", altn)}
                        ${ofpBox("AIRCRAFT", formatAircraft(booking) || atc.aircraft || general.aircraft)}
                        ${ofpBox("ROUTE ID", booking.route_id || routeRef?.id)}
                        ${ofpBox("DIST", routeRef?.distance || booking.distance)}
                        ${ofpBox("EET", times.est_time_enroute || routeRef?.length)}
                        ${ofpBox("ZFW", weights.est_zfw || weights.max_zfw)}
                    </div>
                    <div class="ofp-section">
                        <h3>ATC FLIGHT PLAN</h3>
                        <div class="ofp-pre">${escapeHtml(atc.section18 || atc.raw || "N/A")}</div>
                    </div>
                    <div class="ofp-section">
                        <h3>ROUTE</h3>
                        <div class="ofp-pre">${escapeHtml(route)}</div>
                    </div>
                    <div class="ofp-section">
                        <h3>FUEL / TIMES</h3>
                        <div class="ofp-pre">${escapeHtml(JSON.stringify({ fuel, times }, null, 2))}</div>
                    </div>
                </div>
            `;
        }

        function ofpBox(label, value) {
            return `<div class="ofp-box"><span>${escapeHtml(label)}</span><strong>${escapeHtml(formatValue(value))}</strong></div>`;
        }

        function formatRoute(data) {
            const route = lookupRoute(data.route_id);
            if (route) return `${route.departure} - ${route.arrival}`;
            return `${formatAirport(data, "departure")} - ${formatAirport(data, "arrival")}`;
        }

        function formatAirport(data, side) {
            const direct = data?.[`${side}_icao`] || data?.[`${side}_iata`] || data?.[`${side}_code`];
            if (direct) return direct;
            const route = lookupRoute(data.route_id);
            if (route) return side === "departure" ? route.departure : route.arrival;
            const id = data?.[`${side}_id`];
            const airport = lookupAirport(id);
            if (airport) {
                const code = airport.icao || airport.iata || `Airport #${airport.id}`;
                return airport.name ? `${code} - ${airport.name}` : code;
            }
            return id ? `Airport #${id}` : "N/A";
        }

        function formatAircraft(data) {
            const ref = lookupAircraft(data.aircraft_id);
            if (ref) return [ref.registration, ref.name].filter(Boolean).join(" - ");
            return data.aircraft_id ? `Aircraft #${data.aircraft_id}` : "N/A";
        }

        function lookupAirport(id) {
            if (id === undefined || id === null || id === "") return null;
            return window.HPF_REFERENCE_DATA?.airports?.[String(id)] || null;
        }

        function lookupAircraft(id) {
            if (id === undefined || id === null || id === "") return null;
            return window.HPF_REFERENCE_DATA?.aircraft?.[String(id)] || null;
        }

        function lookupRoute(id) {
            if (id === undefined || id === null || id === "") return null;
            return window.HPF_REFERENCE_DATA?.routes?.[String(id)] || null;
        }

        function formatValue(value, fallback = "N/A") {
            return value === undefined || value === null || value === "" ? fallback : value;
        }

        function escapeHtml(value) {
            return String(formatValue(value, ""))
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
