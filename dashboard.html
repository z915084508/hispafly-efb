<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HISPAFLY EFB | Dashboard</title>
    <link rel="stylesheet" href="assets/dashboard.css">
</head>
<body>
    <main class="app">
        <div class="status-bar" aria-hidden="true">
            <span id="utcTime">--:-- UTC</span>
            <span>HISPAFLY EFB</span>
            <span class="status-right">
                <span class="signal">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span>100%</span>
            </span>
        </div>

        <div class="shell">
            <aside class="sidebar">
                <div class="brand">
                    <img src="assets/hispafly-logo-white.png" alt="HISPAFLY">
                </div>

                <nav class="menu" aria-label="Dashboard sections">
                    <div class="menu-group" data-group="notams">
                        <button class="menu-btn" data-view="notams">
                            <span>NOTAM</span>
                            <small>Operational notices</small>
                        </button>
                    </div>
                    <div class="menu-group" data-group="profile">
                        <button class="menu-btn" data-view="profile">
                            <span>Pilot Profile</span>
                            <small>Identity and rank</small>
                        </button>
                        <div class="submenu">
                            <button class="submenu-btn" data-view="pirepLogbook">PIREP Logbook</button>
                        </div>
                    </div>
                    <div class="menu-group" data-group="flightCenter">
                        <button class="menu-btn" data-view="flightCenter">
                            <span>Flight Center</span>
                            <small>Bookings and OFP</small>
                        </button>
                    </div>
                    <div class="menu-group" data-group="weather">
                        <button class="menu-btn" data-view="weather">
                            <span>WX Info</span>
                            <small>METAR by ICAO</small>
                        </button>
                    </div>
                    <div class="menu-group" data-group="telex">
                        <button class="menu-btn" data-view="telex">
                            <span>TELEX</span>
                            <small>Hoppie ACARS</small>
                        </button>
                    </div>
                </nav>

                <div class="sidebar-footer">
                    <div class="pilot-chip">
                        <strong id="pilotName">Pilot loading</strong>
                        <span id="pilotRank">HISPAFLY crew</span>
                    </div>
                    <button class="logout-btn" onclick="logout()">LOG OUT</button>
                </div>
            </aside>

            <section class="content">
                <div class="content-header">
                    <div>
                        <div class="eyebrow" id="viewEyebrow">Operations</div>
                        <h1 id="viewTitle">NOTAM</h1>
                        <p class="subhead" id="viewSubhead">Operational notices and airline advisories.</p>
                    </div>
                    <button class="refresh-btn" id="refreshBtn">REFRESH</button>
                </div>
                <div class="panel" id="mainPanel">
                    <p class="empty">Loading dashboard...</p>
                </div>
            </section>
        </div>
    </main>

    <script src="assets/reference-data.js"></script>
    <script src="assets/dashboard.js"></script>
    <script src="assets/telex.js"></script>
</body>
</html>
