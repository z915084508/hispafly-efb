<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HPF EFB | Pilot Dashboard</title>
    <style>
        :root {
            --color-spain-red: #c1121f;
            --color-spain-yellow: #ffc107;
            --color-dark-brown: #3a2413;
            --color-light-cream: #f2e9d8;
            --color-white: #ffffff;
            --shadow-soft: 0 4px 16px rgba(0,0,0,0.15);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(58, 36, 19, 0.88), rgba(58, 36, 19, 0.94)), url("aircraft-bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px 15px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap:12px;
        }
        .logo-block {
            display:flex;
            align-items:center;
            gap:10px;
        }
        .logo-small {
            height: 50px;
        }
        .header-title {
            color:#fff;
            font-size:22px;
            font-weight:bold;
        }
        .logout-btn {
            padding: 9px 18px;
            border: 2px solid var(--color-spain-red);
            background: transparent;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .logout-btn:hover {
            background: var(--color-spain-red);
        }
        .card {
            background: var(--color-light-cream);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-soft);
        }
        .card h2 {
            color: var(--color-dark-brown);
            font-size: 20px;
            margin-bottom: 12px;
            border-left: 4px solid var(--color-spain-red);
            padding-left: 10px;
        }
        .card p {
            color: #443322;
            font-size: 15px;
            line-height: 1.7;
        }
        .divider-line {
            height: 3px;
            background: linear-gradient(90deg, var(--color-spain-red), var(--color-spain-yellow), var(--color-spain-red));
            border-radius: 2px;
            margin: 20px 0;
        }
        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap:16px;
        }
        @media (max-width:700px) {
            .grid-row {
                grid-template-columns:1fr;
            }
        }
        .item-block {
            background:#fff;
            padding:14px;
            border-radius:10px;
            margin:8px 0;
        }
        .map-box {
            width:100%;
            height:280px;
            background:#ddd;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#333;
        }
        footer {
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            margin-top: 30px;
        }
        .tip-text {
            color:#777;
            font-style:italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div class="logo-block">
                <img class="logo-small" src="logo.png" alt="Hispafly Logo">
                <span class="header-title">HPF EFB</span>
            </div>
            <button class="logout-btn" onclick="logout()">LOG OUT</button>
        </div>

        <div class="card">
            <h2>Pilot Profile</h2>
            <div id="profileBox">
                <p class="tip-text">Loading pilot data...</p>
            </div>
        </div>

        <div class="divider-line"></div>

        <div class="grid-row">
            <div class="card">
                <h2>My Flight Bookings</h2>
                <div id="bookingBox">
                    <p class="tip-text">Loading bookings...</p>
                </div>
            </div>
            <div class="card">
                <h2>Flight Track Map</h2>
                <div class="map-box" id="mapContainer">
                    Select a PIREP to view flight route track
                </div>
            </div>
        </div>

        <div class="card">
            <h2>My PIREP Logbook</h2>
            <div id="pirepBox">
                <p class="tip-text">Loading flight reports...</p>
            </div>
        </div>

        <footer>
            © 2026 Hispafly Virtual Airline — HPF EFB System
        </footer>
    </div>

    <script>
        const API_BASE = "/api/token-proxy";
        const API_ROOT = "https://vamsys.io/api/v3/pilot";
        let accessToken = localStorage.getItem("vamsys_token");

        if (!accessToken) {
            window.location.href = "index.html";
        }
        const authHeader = {
            "Authorization": `Bearer ${accessToken}`,
            "Content-Type": "application/json"
        };

        window.addEventListener("DOMContentLoaded", ()=>{
            loadPilotProfile();
            loadBookings();
            loadPireps();
        });

        // 飞行员资料
        async function loadPilotProfile() {
            try {
                const res = await fetch(`${API_ROOT}/user`, {headers:authHeader});
                const json = await res.json();
                const u = json.data;
                const html = `
                    <p><strong>Full Name:</strong> ${u.first_name} ${u.last_name}</p>
                    <p><strong>Email:</strong> ${u.email}</p>
                    <p><strong>VATSIM ID:</strong> ${u.networks?.vatsim_id || "N/A"}</p>
                    <p><strong>IVAO ID:</strong> ${u.networks?.ivao_id || "N/A"}</p>
                    <p><strong>Pilot ID:</strong> ${u.id}</p>
                `;
                document.getElementById("profileBox").innerHTML = html;
            } catch (err) {
                document.getElementById("profileBox").innerHTML = `<p style="color:red">Failed to load profile: ${err.message}</p>`;
            }
        }

        // 预订航班
        async function loadBookings() {
            try {
                const res = await fetch(`${API_ROOT}/bookings?sort=-id&page[size]=10`, {headers:authHeader});
                const json = await res.json();
                const list = json.data || [];
                if(list.length === 0) {
                    document.getElementById("bookingBox").innerHTML = "<p>No active flight bookings</p>";
                    return;
                }
                let html = "";
                list.forEach(book=>{
                    html += `
                    <div class="item-block">
                        <p><strong>${book.flight_number} ${book.callsign || ""}</strong></p>
                        <p>${book.departure_id} → ${book.arrival_id}</p>
                        <p>Dep: ${new Date(book.departure_time).toLocaleString()}</p>
                        <p>Network: ${book.network}</p>
                    </div>
                    `;
                });
                document.getElementById("bookingBox").innerHTML = html;
            } catch (err) {
                document.getElementById("bookingBox").innerHTML = `<p style="color:red">Load bookings error: ${err.message}</p>`;
            }
        }

        // PIREP列表
        async function loadPireps() {
            try {
                const res = await fetch(`${API_ROOT}/pireps?sort=-id&page[size]=10`, {headers:authHeader});
                const json = await res.json();
                const list = json.data || [];
                if(list.length === 0) {
                    document.getElementById("pirepBox").innerHTML = "<p>No submitted PIREPs yet</p>";
                    return;
                }
                let html = "";
                list.forEach(p=>{
                    html += `
                    <div class="item-block">
                        <p><strong>${p.flight_number} | ${p.status}</strong></p>
                        <p>${p.departure_id} → ${p.arrival_id}</p>
                        <p>Flight Time: ${p.flight_time} mins | Fuel Used: ${p.fuel_used}</p>
                        <p>Landing Rate: ${p.landing_rate}</p>
                        <button onclick="loadFlightMap(${p.id})" style="margin-top:6px;padding:4px 10px;cursor:pointer;">View Flight Map</button>
                    </div>
                    `;
                });
                document.getElementById("pirepBox").innerHTML = html;
            } catch (err) {
                document.getElementById("pirepBox").innerHTML = `<p style="color:red">Load PIREPs error: ${err.message}</p>`;
            }
        }

        // 航线地图数据
        async function loadFlightMap(pirepId) {
            const mapBox = document.getElementById("mapContainer");
            mapBox.innerText = "Loading flight track data...";
            try {
                const res = await fetch(`${API_ROOT}/pireps/${pirepId}/profile`, {headers:authHeader});
                const track = await res.json();
                const altPoints = track.data?.altitude || [];
                const groundPoints = track.data?.groundspeed || [];
                const annots = track.data?.annotations || [];
                mapBox.innerHTML = `
                    <div style="text-align:center;">
                        <p>Flight Track Data Loaded (PIREP #${pirepId})</p>
                        <p>Altitude Points: ${altPoints.length}</p>
                        <p>Groundspeed Points: ${groundPoints.length}</p>
                        <p>Markers: ${annots.length}</p>
                        <p class="tip-text" style="margin-top:8px;">Integrate Leaflet/Mapbox for geographic map rendering</p>
                    </div>
                `;
            } catch (err) {
                mapBox.innerHTML = `<p style="color:red">Failed to load track: ${err.message}</p>`;
            }
        }

        // 登出
        function logout(){
            localStorage.removeItem("vamsys_token");
            sessionStorage.removeItem("code_verifier");
            sessionStorage.removeItem("oauth_state");
            localStorage.removeItem("code_verifier");
            localStorage.removeItem("oauth_state");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
