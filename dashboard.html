<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HPF EFB | Pilot Dashboard</title>
    <style>
        :root {
            --color-spain-red: #c1121f;
            --color-spain-yellow: #ffc107;
            --color-dark-brown: #3a2413;
            --color-light-cream: #f2e9d8;
            --color-white: #ffffff;
            --shadow-soft: 0 4px 16px rgba(0,0,0,0.15);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(58, 36, 19, 0.88), rgba(58, 36, 19, 0.94)), url("aircraft-bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px 15px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap:12px;
        }
        .logo-block {
            display:flex;
            align-items:center;
            gap:10px;
        }
        .logo-small {
            height: 50px;
        }
        .header-title {
            color:#fff;
            font-size:22px;
            font-weight:bold;
        }
        .logout-btn {
            padding: 9px 18px;
            border: 2px solid var(--color-spain-red);
            background: transparent;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .logout-btn:hover {
            background: var(--color-spain-red);
        }
        .card {
            background: var(--color-light-cream);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-soft);
        }
        .card h2 {
            color: var(--color-dark-brown);
            font-size: 20px;
            margin-bottom: 12px;
            border-left: 4px solid var(--color-spain-red);
            padding-left: 10px;
        }
        .card p {
            color: #443322;
            font-size: 15px;
            line-height: 1.7;
        }
        .divider-line {
            height: 3px;
            background: linear-gradient(90deg, var(--color-spain-red), var(--color-spain-yellow), var(--color-spain-red));
            border-radius: 2px;
            margin: 20px 0;
        }
        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap:16px;
        }
        @media (max-width:700px) {
            .grid-row {
                grid-template-columns:1fr;
            }
        }
        .item-block {
            background:#fff;
            padding:14px;
            border-radius:10px;
            margin:8px 0;
        }
        .map-box {
            width:100%;
            height:280px;
            background:#ddd;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#333;
        }
        footer {
            text-align: center;
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            margin-top: 30px;
        }
        .tip-text {
            color:#777;
            font-style:italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div class="logo-block">
                <img class="logo-small" src="logo.png" alt="Hispafly Logo">
                <span class="header-title">HPF EFB</span>
            </div>
            <button class="logout-btn" onclick="logout()">LOG OUT</button>
        </div>

        <div class="card">
            <h2>Pilot Profile</h2>
            <div id="profileBox">
                <p class="tip-text">Loading pilot data...</p>
            </div>
        </div>

        <div class="divider-line"></div>

        <div class="grid-row">
            <div class="card">
                <h2>My Flight Bookings</h2>
                <div id="bookingBox">
                    <p class="tip-text">Loading bookings...</p>
                </div>
            </div>
            <div class="card">
                <h2>Flight Track Map</h2>
                <div class="map-box" id="mapContainer">
                    Select a PIREP to view flight route track
                </div>
            </div>
        </div>

        <div class="card">
            <h2>My PIREP Logbook</h2>
            <div id="pirepBox">
                <p class="tip-text">Loading flight reports...</p>
            </div>
        </div>

        <footer>
            © 2026 Hispafly Virtual Airline — HPF EFB System
        </footer>
    </div>

    <script>
        const API_ROOT = "https://vamsys.io/api/v3/pilot";
        let accessToken = localStorage.getItem("vamsys_token");

        if (!accessToken) {
            window.location.href = "index.html";
        }

        const authHeader = {
            "Authorization": `Bearer ${accessToken}`,
            "Accept": "application/json"
        };

        window.addEventListener("DOMContentLoaded", () => {
            loadPilotProfile();
            loadBookings();
            loadPireps();
        });

        function buildApiUrl(path, params = {}) {
            const url = new URL(`${API_ROOT}${path}`);
            Object.entries(params).forEach(([key, value]) => {
                if (value !== undefined && value !== null && value !== "") {
                    url.searchParams.set(key, value);
                }
            });
            return url.toString();
        }

        async function fetchPilotJson(path, params = {}) {
            const url = buildApiUrl(path, params);
            const res = await fetch(url, { headers: authHeader });
            const text = await res.text();
            let json;

            try {
                json = JSON.parse(text);
            } catch (err) {
                const preview = text.replace(/\s+/g, " ").slice(0, 180) || "empty response";
                throw new Error(`VAMSYS returned non-JSON for ${path} (HTTP ${res.status}): ${preview}`);
            }

            if (!res.ok) {
                const msg = json.message || json.error || JSON.stringify(json).slice(0, 180);
                throw new Error(`VAMSYS ${path} failed (HTTP ${res.status}): ${msg}`);
            }

            return json;
        }

        function formatValue(value, fallback = "N/A") {
            return value === undefined || value === null || value === "" ? fallback : value;
        }

        function formatDate(value) {
            if (!value) return "N/A";
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
        }

        async function loadPilotProfile() {
            try {
                const json = await fetchPilotJson("/user");
                const u = json.data || {};
                const networks = u.networks || {};
                const html = `
                    <p><strong>Full Name:</strong> ${formatValue(u.first_name, "")} ${formatValue(u.last_name, "")}</p>
                    <p><strong>Email:</strong> ${formatValue(u.email)}</p>
                    <p><strong>VATSIM ID:</strong> ${formatValue(networks.vatsim_id)}</p>
                    <p><strong>IVAO ID:</strong> ${formatValue(networks.ivao_id)}</p>
                    <p><strong>Pilot ID:</strong> ${formatValue(u.id)}</p>
                `;
                document.getElementById("profileBox").innerHTML = html;
            } catch (err) {
                document.getElementById("profileBox").innerHTML = `<p style="color:red">Failed to load profile: ${err.message}</p>`;
            }
        }

        async function loadBookings() {
            try {
                const json = await fetchPilotJson("/bookings", {
                    sort: "-id",
                    "page[size]": "10",
                    "filter[status]": "current"
                });
                const list = json.data || [];
                if (list.length === 0) {
                    document.getElementById("bookingBox").innerHTML = "<p>No active flight bookings</p>";
                    return;
                }

                let html = "";
                list.forEach(book => {
                    html += `
                    <div class="item-block">
                        <p><strong>${formatValue(book.flight_number, "Flight")} ${formatValue(book.callsign, "")}</strong></p>
                        <p>${formatValue(book.departure_id)} → ${formatValue(book.arrival_id)}</p>
                        <p>Dep: ${formatDate(book.departure_time)}</p>
                        <p>Network: ${formatValue(book.network)}</p>
                    </div>
                    `;
                });
                document.getElementById("bookingBox").innerHTML = html;
            } catch (err) {
                document.getElementById("bookingBox").innerHTML = `<p style="color:red">Load bookings error: ${err.message}</p>`;
            }
        }

        async function loadPireps() {
            try {
                const json = await fetchPilotJson("/pireps", {
                    sort: "-id",
                    "page[size]": "10"
                });
                const list = json.data || [];
                if (list.length === 0) {
                    document.getElementById("pirepBox").innerHTML = "<p>No submitted PIREPs yet</p>";
                    return;
                }

                let html = "";
                list.forEach(p => {
                    html += `
                    <div class="item-block">
                        <p><strong>${formatValue(p.flight_number, "Flight")} | ${formatValue(p.status)}</strong></p>
                        <p>${formatValue(p.departure_id)} → ${formatValue(p.arrival_id)}</p>
                        <p>Flight Time: ${formatValue(p.flight_time, 0)} mins | Fuel Used: ${formatValue(p.fuel_used, 0)}</p>
                        <p>Landing Rate: ${formatValue(p.landing_rate)}</p>
                        <button onclick="loadFlightMap(${p.id})" style="margin-top:6px;padding:4px 10px;cursor:pointer;">View Flight Map</button>
                    </div>
                    `;
                });
                document.getElementById("pirepBox").innerHTML = html;
            } catch (err) {
                document.getElementById("pirepBox").innerHTML = `<p style="color:red">Load PIREPs error: ${err.message}</p>`;
            }
        }

        async function loadFlightMap(pirepId) {
            const mapBox = document.getElementById("mapContainer");
            mapBox.innerText = "Loading flight track data...";
            try {
                const track = await fetchPilotJson(`/pireps/${pirepId}/profile`);
                const altPoints = track.data?.altitude || [];
                const groundPoints = track.data?.groundspeed || [];
                const annots = track.data?.annotations || [];
                mapBox.innerHTML = `
                    <div style="text-align:center;">
                        <p>Flight Track Data Loaded (PIREP #${pirepId})</p>
                        <p>Altitude Points: ${altPoints.length}</p>
                        <p>Groundspeed Points: ${groundPoints.length}</p>
                        <p>Markers: ${annots.length}</p>
                        <p class="tip-text" style="margin-top:8px;">Integrate Leaflet/Mapbox for geographic map rendering</p>
                    </div>
                `;
            } catch (err) {
                mapBox.innerHTML = `<p style="color:red">Failed to load track: ${err.message}</p>`;
            }
        }

        function logout(){
            localStorage.removeItem("vamsys_token");
            sessionStorage.removeItem("pkce_v");
            sessionStorage.removeItem("pkce_s");
            sessionStorage.removeItem("oauth_redirect_uri");
            localStorage.removeItem("pkce_v");
            localStorage.removeItem("pkce_s");
            localStorage.removeItem("oauth_redirect_uri");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
