<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>HISPAFLY EFB | Dashboard</title>
    <style>
        :root {
            --red: #d71920;
            --yellow: #ffc400;
            --ink: #05080d;
            --panel: rgba(4, 7, 12, 0.82);
            --panel-soft: rgba(255,255,255,0.08);
            --line: rgba(255,255,255,0.14);
            --text: #ffffff;
            --muted: rgba(255,255,255,0.66);
            --danger: #ff6b6b;
            --ok: #72f0a3;
            --shadow: 0 24px 80px rgba(0,0,0,0.38);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #05080d;
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(1,3,7,0.96) 0%, rgba(1,3,7,0.88) 32%, rgba(1,3,7,0.55) 100%),
                url("assets/login-tablet-bg.jpg");
            background-size: cover;
            background-position: center;
        }

        .app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            grid-template-rows: 30px 1fr;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            background: rgba(0,0,0,0.56);
            border-bottom: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.78);
            font-size: 11px;
        }

        .status-right {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .signal {
            display: inline-flex;
            align-items: end;
            gap: 2px;
            height: 12px;
        }

        .signal span {
            width: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.82);
        }

        .signal span:nth-child(1) { height: 4px; }
        .signal span:nth-child(2) { height: 7px; }
        .signal span:nth-child(3) { height: 10px; }
        .signal span:nth-child(4) {
            height: 12px;
            background: rgba(255,255,255,0.38);
        }

        .shell {
            min-height: calc(100vh - 30px);
            display: grid;
            grid-template-columns: 286px minmax(0, 1fr);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 30px);
            padding: 28px 20px 22px;
            background: linear-gradient(180deg, rgba(1,3,7,0.94), rgba(1,3,7,0.80));
            border-right: 1px solid var(--line);
            backdrop-filter: blur(12px);
        }

        .brand {
            margin-bottom: 34px;
        }

        .brand img {
            width: 220px;
            max-width: 100%;
            display: block;
            filter: drop-shadow(0 14px 28px rgba(0,0,0,0.32));
        }

        .menu {
            display: grid;
            gap: 12px;
        }

        .menu-group {
            display: grid;
            gap: 7px;
        }

        .menu-btn {
            width: 100%;
            min-height: 52px;
            border: 1px solid transparent;
            border-radius: 14px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.74);
            cursor: pointer;
            text-align: left;
            padding: 11px 14px;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }

        .menu-btn span {
            display: block;
            font-size: 15px;
            font-weight: 700;
        }

        .menu-btn small {
            display: block;
            color: rgba(255,255,255,0.48);
            font-size: 11px;
            margin-top: 3px;
        }

        .menu-btn:hover,
        .menu-btn.active {
            border-color: rgba(255,196,0,0.45);
            background: linear-gradient(90deg, rgba(215,25,32,0.36), rgba(255,196,0,0.12));
            color: #fff;
        }

        .submenu {
            display: none;
            gap: 6px;
            padding-left: 12px;
        }

        .menu-group.open .submenu {
            display: grid;
        }

        .submenu-btn {
            width: 100%;
            min-height: 36px;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.64);
            cursor: pointer;
            text-align: left;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .submenu-btn:hover,
        .submenu-btn.active {
            border-color: rgba(255,196,0,0.34);
            color: #fff;
            background: rgba(255,196,0,0.08);
        }

        .sidebar-footer {
            margin-top: auto;
            display: grid;
            gap: 12px;
        }

        .pilot-chip {
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
        }

        .pilot-chip strong {
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .pilot-chip span {
            color: var(--muted);
            font-size: 12px;
        }

        .logout-btn {
            min-height: 42px;
            border: 1px solid rgba(215,25,32,0.8);
            border-radius: 999px;
            background: rgba(215,25,32,0.08);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        .content {
            min-width: 0;
            height: calc(100vh - 30px);
            overflow: hidden;
            padding: 28px;
        }

        .content-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 20px;
        }

        .eyebrow {
            color: var(--yellow);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-size: clamp(28px, 3vw, 42px);
            line-height: 1;
        }

        .subhead {
            color: var(--muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .refresh-btn {
            min-width: 112px;
            min-height: 42px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        .panel {
            height: calc(100vh - 148px);
            overflow: auto;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(4,7,12,0.62);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .panel::-webkit-scrollbar {
            width: 10px;
        }

        .panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.18);
            border-radius: 999px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(255,255,255,0.07);
            padding: 16px;
        }

        .card.wide {
            grid-column: 1 / -1;
        }

        .card h2,
        .card h3 {
            font-size: 17px;
            margin-bottom: 12px;
            padding-left: 10px;
            border-left: 4px solid var(--red);
        }

        .card p,
        .data-row,
        .empty {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .data-list {
            display: grid;
            gap: 8px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .data-row:last-child {
            border-bottom: 0;
        }

        .data-row strong {
            color: rgba(255,255,255,0.90);
            font-weight: 700;
        }

        .list {
            display: grid;
            gap: 12px;
        }

        .item {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 14px;
            background: rgba(0,0,0,0.18);
        }

        .item-button {
            width: 100%;
            color: inherit;
            cursor: pointer;
            text-align: left;
        }

        .item-button:hover {
            border-color: rgba(255,196,0,0.42);
            background: rgba(255,196,0,0.08);
        }

        .item-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 9px;
            border-radius: 999px;
            background: rgba(255,196,0,0.14);
            color: var(--yellow);
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            color: var(--muted);
            font-size: 12px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .action-card {
            min-height: 126px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.06);
        }

        .action-card strong {
            display: block;
            color: #fff;
            margin-bottom: 8px;
        }

        .action-card p {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .telex {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr) 340px;
            gap: 14px;
        }

        .telex-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 30px;
            padding: 0 11px;
            border-radius: 999px;
            background: rgba(255,196,0,0.12);
            color: var(--yellow);
            font-size: 12px;
            font-weight: 800;
        }

        .template-grid {
            display: grid;
            gap: 8px;
        }

        .template-btn {
            min-height: 36px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            text-align: left;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .template-btn:hover {
            border-color: rgba(255,196,0,0.38);
            background: rgba(255,196,0,0.08);
        }

        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
        }

        .field label {
            color: rgba(255,255,255,0.78);
            font-size: 12px;
            font-weight: 700;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 12px;
            background: rgba(0,0,0,0.28);
            color: #fff;
            padding: 11px 12px;
            font: inherit;
        }

        textarea {
            min-height: 132px;
            resize: vertical;
        }

        .primary-btn {
            width: 100%;
            min-height: 44px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--red), #ef3c18 48%, var(--yellow));
            color: #fff;
            cursor: pointer;
            font-weight: 800;
        }

        .message-log {
            min-height: 350px;
            border-radius: 16px;
            padding: 14px;
            background: rgba(0,0,0,0.24);
            border: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.70);
            font-family: "Courier New", monospace;
            font-size: 13px;
            line-height: 1.55;
            white-space: pre-wrap;
        }

        .notam-content {
            margin-top: 14px;
            min-height: 220px;
            border-radius: 16px;
            padding: 16px;
            background: rgba(0,0,0,0.24);
            border: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.78);
            font-size: 14px;
            line-height: 1.6;
        }

        .notam-content h1,
        .notam-content h2,
        .notam-content h3 {
            font-size: 17px;
            margin: 12px 0 8px;
            color: #fff;
        }

        .notam-content h1:first-child,
        .notam-content h2:first-child,
        .notam-content h3:first-child,
        .notam-content p:first-child {
            margin-top: 0;
        }

        .notam-content p {
            margin: 0 0 10px;
            color: rgba(255,255,255,0.78);
        }

        .notam-content strong {
            color: #fff;
        }

        .notam-content ul,
        .notam-content ol {
            margin: 8px 0 12px 20px;
        }

        .notam-content li {
            margin: 5px 0;
        }

        .ofp-viewer {
            display: grid;
            gap: 14px;
        }

        .ofp-toolbar {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) auto;
            gap: 10px;
            align-items: end;
        }

        .inline-btn {
            min-height: 44px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--red), #ef3c18 48%, var(--yellow));
            color: #fff;
            cursor: pointer;
            font-weight: 800;
            padding: 0 18px;
            white-space: nowrap;
        }

        .pdf-frame {
            width: 100%;
            min-height: 680px;
            border: 1px solid rgba(0,0,0,0.22);
            border-radius: 12px;
            background: #fff;
        }

        .ofp-sheet {
            min-height: 540px;
            border-radius: 12px;
            padding: 22px;
            background: #f4f1e8;
            color: #111;
            font-family: "Courier New", monospace;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
        }

        .ofp-title {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 14px;
            padding-bottom: 12px;
            border-bottom: 3px solid #111;
            margin-bottom: 16px;
        }

        .ofp-title h2 {
            border: 0;
            padding: 0;
            margin: 0;
            color: #111;
            font-size: 28px;
        }

        .ofp-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .ofp-box {
            border: 1px solid #222;
            padding: 8px;
            min-height: 58px;
        }

        .ofp-box span {
            display: block;
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .ofp-box strong {
            display: block;
            color: #111;
            font-size: 16px;
        }

        .ofp-section {
            border-top: 1px solid #222;
            padding-top: 12px;
            margin-top: 12px;
        }

        .ofp-section h3 {
            border: 0;
            padding: 0;
            margin: 0 0 8px;
            color: #111;
            font-size: 14px;
            letter-spacing: 0;
        }

        .ofp-pre {
            white-space: pre-wrap;
            color: #111;
            line-height: 1.45;
            font-size: 13px;
        }

        .error {
            color: var(--danger);
        }

        .ok {
            color: var(--ok);
        }

        @media (max-width: 820px) {
            body {
                overflow: auto;
            }

            .app {
                min-height: 100svh;
            }

            .shell {
                min-height: calc(100svh - 30px);
                grid-template-columns: 1fr;
            }

            .sidebar {
                min-height: auto;
                padding: 16px;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .brand {
                margin-bottom: 16px;
            }

            .brand img {
                width: 190px;
            }

            .menu {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .submenu {
                padding-left: 0;
            }

            .sidebar-footer {
                margin-top: 14px;
                grid-template-columns: 1fr 130px;
            }

            .content {
                height: auto;
                min-height: 70svh;
                padding: 18px;
                overflow: visible;
            }

            .panel {
                height: auto;
                max-height: none;
            }

            .grid,
            .action-grid,
            .telex {
                grid-template-columns: 1fr;
            }

            .meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="status-bar" aria-hidden="true">
            <span id="utcTime">--:-- UTC</span>
            <span>HISPAFLY EFB</span>
            <span class="status-right">
                <span class="signal">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span>100%</span>
            </span>
        </div>

        <div class="shell">
            <aside class="sidebar">
                <div class="brand">
                    <img src="assets/hispafly-logo-white.png" alt="HISPAFLY">
                </div>

                <nav class="menu" aria-label="Dashboard sections">
                    <div class="menu-group" data-group="notams">
                        <button class="menu-btn" data-view="notams">
                            <span>NOTAM</span>
                            <small>Operational notices</small>
                        </button>
                    </div>
                    <div class="menu-group" data-group="profile">
                        <button class="menu-btn" data-view="profile">
                            <span>Pilot Profile</span>
                            <small>Identity and rank</small>
                        </button>
                        <div class="submenu">
                            <button class="submenu-btn" data-view="pirepLogbook">PIREP Logbook</button>
                        </div>
                    </div>
                    <div class="menu-group" data-group="flightCenter">
                        <button class="menu-btn" data-view="flightCenter">
                            <span>Flight Center</span>
                            <small>Bookings and OFP</small>
                        </button>
                        <div class="submenu">
                            <button class="submenu-btn" data-view="showBooking">Show Pilot Booking</button>
                            <button class="submenu-btn" data-view="simbriefOfp">SimBrief OFP</button>
                        </div>
                    </div>
                    <div class="menu-group" data-group="flightStatus">
                        <button class="menu-btn" data-link="flight-status.html">
                            <span>Flight Status</span>
                            <small>Track map</small>
                        </button>
                    </div>
                    <div class="menu-group" data-group="telex">
                        <button class="menu-btn" data-view="telex">
                            <span>TELEX</span>
                            <small>Hoppie ACARS</small>
                        </button>
                    </div>
                </nav>

                <div class="sidebar-footer">
                    <div class="pilot-chip">
                        <strong id="pilotName">Pilot loading</strong>
                        <span id="pilotRank">HISPAFLY crew</span>
                    </div>
                    <button class="logout-btn" onclick="logout()">LOG OUT</button>
                </div>
            </aside>

            <section class="content">
                <div class="content-header">
                    <div>
                        <div class="eyebrow" id="viewEyebrow">Operations</div>
                        <h1 id="viewTitle">NOTAM</h1>
                        <p class="subhead" id="viewSubhead">Operational notices and airline advisories.</p>
                    </div>
                    <button class="refresh-btn" id="refreshBtn">REFRESH</button>
                </div>
                <div class="panel" id="mainPanel">
                    <p class="empty">Loading dashboard...</p>
                </div>
            </section>
        </div>
    </main>

    <script src="assets/reference-data.js"></script>
    <script>
        const API_ROOT = "https://vamsys.io/api/v3/pilot";
        let accessToken = localStorage.getItem("vamsys_token");
        let currentView = "notams";
        let pilotData = null;
        let profileData = null;
        let rankData = null;
        let statisticsData = null;
        let bookingsData = null;
        let pirepsData = null;
        let claimsData = null;
        let notamsData = null;

        if (!accessToken) {
            window.location.href = "index.html";
        }

        const authHeader = {
            "Authorization": `Bearer ${accessToken}`,
            "Accept": "application/json"
        };

        window.addEventListener("DOMContentLoaded", () => {
            updateUtcTime();
            setInterval(updateUtcTime, 30000);
            setupNavigation();
            loadInitialDashboard();
        });

        function updateUtcTime() {
            const now = new Date();
            const hours = String(now.getUTCHours()).padStart(2, "0");
            const minutes = String(now.getUTCMinutes()).padStart(2, "0");
            document.getElementById("utcTime").textContent = `${hours}:${minutes} UTC`;
        }

        function setupNavigation() {
            document.querySelectorAll(".menu-btn, .submenu-btn").forEach((button) => {
                button.addEventListener("click", () => {
                    if (button.dataset.link) {
                        window.location.href = button.dataset.link;
                        return;
                    }
                    setView(button.dataset.view);
                });
            });
            document.getElementById("refreshBtn").addEventListener("click", () => refreshCurrentView(true));
        }

        async function loadInitialDashboard() {
            await loadPilotProfile();
            await setView("notams");
        }

        async function setView(view) {
            currentView = view;
            document.querySelectorAll(".menu-btn, .submenu-btn").forEach((button) => {
                button.classList.toggle("active", button.dataset.view === view);
            });
            document.querySelectorAll(".menu-group").forEach((group) => {
                const isOpen = !!group.querySelector(`[data-view="${view}"]`);
                group.classList.toggle("open", isOpen);
            });
            updateHeader(view);
            await refreshCurrentView(false);
        }

        function updateHeader(view) {
            const copy = {
                notams: ["Operations", "NOTAM", "Operational notices and airline advisories."],
                profile: ["Pilot", "Pilot Profile", "Crew identity, network IDs, rank, and flight time."],
                pirepLogbook: ["Logbook", "PIREP Logbook", "Select a PIREP to open the full pilot report."],
                flightCenter: ["Flights", "Flight Center", "Current bookings and dispatch documents."],
                showBooking: ["Bookings", "Show Pilot Booking", "Select a booking to open full booking details."],
                simbriefOfp: ["OFP", "SimBrief OFP", "Load the SimBrief OFP for a booking."],
                telex: ["ACARS", "TELEX", "Hoppie ACARS style logon, inbox, and telex compose station."]
            }[view];
            document.getElementById("viewEyebrow").textContent = copy[0];
            document.getElementById("viewTitle").textContent = copy[1];
            document.getElementById("viewSubhead").textContent = copy[2];
        }

        async function refreshCurrentView(force) {
            const panel = document.getElementById("mainPanel");

        function buildApiUrl(path, params = {}) {
            const url = new URL(`${API_ROOT}${path}`);
            Object.entries(params).forEach(([key, value]) => {
                if (value !== undefined && value !== null && value !== "") {
                    url.searchParams.set(key, value);
                }
            });
            return url.toString();
        }

        async function fetchPilotJson(path, params = {}, options = {}) {
            const url = buildApiUrl(path, params);
            const res = await fetch(url, {
                method: options.method || "GET",
                headers: {
                    ...authHeader,
                    ...(options.body ? { "Content-Type": "application/json" } : {})
                },
                body: options.body ? JSON.stringify(options.body) : undefined
            });
            const text = await res.text();

            if (res.status === 204) {
                return { data: null };
            }

            let json;
            try {
                json = text ? JSON.parse(text) : { data: null };
            } catch (err) {
                const preview = text.replace(/\s+/g, " ").slice(0, 180) || "empty response";
                throw new Error(`VAMSYS returned non-JSON for ${path} (HTTP ${res.status}): ${preview}`);
            }

            if (!res.ok) {
                const msg = json.message || json.error || JSON.stringify(json).slice(0, 180);
                throw new Error(`VAMSYS ${path} failed (HTTP ${res.status}): ${msg}`);
            }

            return json;
        }

        async function loadPilotProfile() {

                fetchPilotJson("/user"),

                fetchPilotJson("/statistics")
            ]);

            if (userResult.status === "fulfilled") {
                pilotData = userResult.value.data || {};
            } else {
                throw userResult.reason;
            }

            profileData = profileResult.status === "fulfilled" ? (profileResult.value.data || {}) : {};
            rankData = rankResult.status === "fulfilled" ? (rankResult.value.data || {}) : {};
            statisticsData = statisticsResult.status === "fulfilled" ? (statisticsResult.value.data || {}) : {};

            const fullName = buildName(pilotData);

        }

        function sanitizeHtml(input) {
            const template = document.createElement("template");
            template.innerHTML = String(input || "");
            const allowedTags = new Set(["P", "BR", "STRONG", "B", "EM", "I", "UL", "OL", "LI", "H1", "H2", "H3"]);

            template.content.querySelectorAll("*").forEach((node) => {
                if (!allowedTags.has(node.tagName)) {
                    const text = document.createTextNode(node.textContent || "");
                    node.replaceWith(text);
                    return;
                }
                [...node.attributes].forEach((attr) => node.removeAttribute(attr.name));
            });

            const html = template.innerHTML.trim();
            if (html) return html;
            return `<p>${escapeHtml(htmlToText(input) || "No content returned.")}</p>`;
        }

        function htmlToText(input) {
            const template = document.createElement("template");
            template.innerHTML = String(input || "");
            return (template.content.textContent || "")
                .replace(/\u00a0/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

            return `<div class="ofp-box"><span>${escapeHtml(label)}</span><strong>${escapeHtml(formatValue(value))}</strong></div>`;
        }

        function formatDetailValue(value) {
            if (typeof value === "object" && value !== null) {
                return JSON.stringify(value);
            }
            return formatValue(value);
        }

        function formatAirport(data, side) {
            const objectKeys = [
                side,
                `${side}_airport`,
                `${side}Airport`,
                `${side}_apt`
            ];
            for (const key of objectKeys) {
                const obj = data?.[key];
                const code = obj?.icao || obj?.icao_code || obj?.iata || obj?.identifier || obj?.code;
                if (code) return code;
            }
            const direct = data?.[`${side}_icao`] || data?.[`${side}_icao_code`] || data?.[`${side}_iata`] || data?.[`${side}_code`];
            if (direct) return direct;
            const id = data?.[`${side}_id`];
            const airport = lookupAirport(id);
            if (airport) {
                const code = airport.icao || airport.iata || `Airport #${airport.id}`;
                return airport.name ? `${code} - ${airport.name}` : code;
            }
            return id ? `Airport #${id}` : "N/A";
        }

        function formatAircraft(data) {
            const aircraft = data.aircraft || data.fleet || {};
            const direct = aircraft.registration || aircraft.reg || aircraft.name || aircraft.icao || aircraft.type;
            if (direct) return direct;
            const ref = lookupAircraft(data.aircraft_id);
            if (ref) {
                return [ref.registration, ref.name].filter(Boolean).join(" - ") || `Aircraft #${ref.id}`;
            }
            return data.aircraft_id ? `Aircraft #${data.aircraft_id}` : "N/A";
        }

        function formatRoute(data) {
            const route = lookupRoute(data.route_id);
            if (route) {
                const routeLine = route.routing ? ` | ${route.routing}` : "";
                return `${route.departure} - ${route.arrival}${routeLine}`;
            }
            return data.user_route || (data.route_id ? `Route #${data.route_id}` : "N/A");
        }

        function lookupAirport(id) {
            if (id === undefined || id === null || id === "") return null;
            return window.HPF_REFERENCE_DATA?.airports?.[String(id)] || null;
        }

        function lookupAircraft(id) {
            if (id === undefined || id === null || id === "") return null;
            return window.HPF_REFERENCE_DATA?.aircraft?.[String(id)] || null;
        }

        function lookupRoute(id) {
            if (id === undefined || id === null || id === "") return null;
            return window.HPF_REFERENCE_DATA?.routes?.[String(id)] || null;
        }

        function formatLabel(key) {
            return key.replace(/_/g, " ").replace(/\b\w/g, (letter) => letter.toUpperCase());
        }

        function renderBookedFlight() {
            const bookingItems = renderFlightList(bookingsData || [], "No active bookings.");
            const pirepItems = renderFlightList(pirepsData || [], "No submitted PIREPs.", true);
            const claimsItems = Array.isArray(claimsData)
                ? renderFlightList(claimsData, "No claims returned.")
                : `<p class="error">${escapeHtml(claimsData?.error || "Claims unavailable.")}</p>`;

            document.getElementById("mainPanel").innerHTML = `
                <div class="grid">
                    <section class="card">
                        <h2>Read Bookings</h2>
                        <div class="list">${bookingItems}</div>
                    </section>
                    <section class="card">
                        <h2>PIREP Logbook</h2>
                        <div class="list">${pirepItems}</div>
                    </section>
                    <section class="card wide">
                        <h2>Claims, Comments, and Logbook</h2>
                        <div class="list">${claimsItems}</div>
                    </section>
                </div>
            `;
        }

        function renderDispatch() {
            document.getElementById("mainPanel").innerHTML = `
                <div class="action-grid">
                    <div class="action-card">
                        <strong>Create Booking</strong>
                        <div class="field">
                            <label for="bookingRouteId">Route ID</label>
                            <input id="bookingRouteId" inputmode="numeric" placeholder="Route ID">
                        </div>
                        <div class="field">
                            <label for="bookingAircraftId">Aircraft ID</label>
                            <input id="bookingAircraftId" inputmode="numeric" placeholder="Aircraft ID">
                        </div>
                        <div class="field">
                            <label for="bookingDepartureTime">Departure Time UTC</label>
                            <input id="bookingDepartureTime" type="datetime-local">
                        </div>
                        <div class="field">
                            <label for="bookingNetwork">Network</label>
                            <select id="bookingNetwork">
                                <option value="offline">Offline</option>
                                <option value="vatsim">VATSIM</option>
                                <option value="ivao">IVAO</option>
                                <option value="poscon">POSCON</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <button class="primary-btn" id="createBookingBtn">CREATE BOOKING</button>
                    </div>
                    <div class="action-card">
                        <strong>Dispatch Flight</strong>
                        <div class="field">
                            <label for="dispatchBookingId">Booking ID</label>
                            <input id="dispatchBookingId" inputmode="numeric" placeholder="Booking ID">
                        </div>
                        <button class="primary-btn" id="loadSimbriefBtn">LOAD SIMBRIEF</button>
                        <p style="margin-top:12px;">Loads operational briefing data for an existing booking.</p>
                    </div>
                    <div class="action-card">
                        <strong>File PIREP</strong>
                        <div class="field">
                            <label for="pirepBookingId">Booking ID</label>
                            <input id="pirepBookingId" inputmode="numeric" placeholder="Booking ID">
                        </div>
                        <div class="field">
                            <label for="pirepDepartureTime">Actual Departure UTC</label>
                            <input id="pirepDepartureTime" type="datetime-local">
                        </div>
                        <div class="field">
                            <label for="pirepArrivalTime">Actual Arrival UTC</label>
                            <input id="pirepArrivalTime" type="datetime-local">
                        </div>
                        <div class="field">
                            <label for="pirepPoints">Points</label>
                            <input id="pirepPoints" inputmode="numeric" value="0">
                        </div>
                        <button class="primary-btn" id="filePirepBtn">FILE PIREP</button>
                    </div>
                    <div class="action-card">
                        <strong>PIREP Comments</strong>
                        <div class="field">
                            <label for="commentPirepId">PIREP ID</label>
                            <input id="commentPirepId" inputmode="numeric" placeholder="PIREP ID">
                        </div>
                        <div class="field">
                            <label for="commentContent">Comment</label>
                            <textarea id="commentContent" maxlength="1000" placeholder="Write comment"></textarea>
                        </div>
                        <button class="primary-btn" id="sendCommentBtn">SEND COMMENT</button>
                    </div>
                    <div class="card wide">
                        <h2>Dispatch Result</h2>
                        <div class="message-log" id="dispatchResult">READY</div>
                    </div>
                </div>
            `;

            document.getElementById("createBookingBtn").addEventListener("click", createBooking);
            document.getElementById("loadSimbriefBtn").addEventListener("click", loadSimbrief);
            document.getElementById("filePirepBtn").addEventListener("click", filePirep);
            document.getElementById("sendCommentBtn").addEventListener("click", sendPirepComment);
        }

        async function createBooking() {
            await runDispatchAction(async () => {
                const body = {
                    route_id: requiredInt("bookingRouteId", "Route ID"),
                    aircraft_id: requiredInt("bookingAircraftId", "Aircraft ID"),
                    departure_time: requiredDate("bookingDepartureTime", "Departure time"),
                    network: document.getElementById("bookingNetwork").value
                };
                const json = await fetchPilotJson("/bookings", {}, { method: "POST", body });
                bookingsData = null;
                return json;
            });
        }

        async function loadSimbrief() {
            await runDispatchAction(async () => {
                const id = requiredInt("dispatchBookingId", "Booking ID");
                return await fetchPilotJson(`/bookings/${id}/simbrief`);
            });
        }

        async function filePirep() {
            await runDispatchAction(async () => {
                const id = requiredInt("pirepBookingId", "Booking ID");
                const body = {
                    departure_time: requiredDate("pirepDepartureTime", "Actual departure"),
                    arrival_time: requiredDate("pirepArrivalTime", "Actual arrival"),
                    points: requiredInt("pirepPoints", "Points"),
                    redirect_url: null
                };
                const json = await fetchPilotJson(`/bookings/${id}/pirep`, {}, { method: "POST", body });
                bookingsData = null;
                pirepsData = null;
                return json;
            });
        }

        async function sendPirepComment() {
            await runDispatchAction(async () => {
                const id = requiredInt("commentPirepId", "PIREP ID");
                const content = document.getElementById("commentContent").value.trim();
                if (!content) throw new Error("Comment is required.");
                return await fetchPilotJson(`/pireps/${id}/comments`, {}, { method: "POST", body: { content } });
            });
        }

        async function runDispatchAction(action) {
            const resultBox = document.getElementById("dispatchResult");
            resultBox.textContent = "SENDING REQUEST...";
            try {
                const result = await action();
                resultBox.textContent = JSON.stringify(result.data ?? result, null, 2);
            } catch (err) {
                resultBox.innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
            }
        }

        function requiredInt(id, label) {
            const value = Number.parseInt(document.getElementById(id).value, 10);
            if (!Number.isFinite(value)) throw new Error(`${label} is required.`);
            return value;
        }

        function requiredDate(id, label) {
            const value = document.getElementById(id).value;
            if (!value) throw new Error(`${label} is required.`);
            return new Date(value).toISOString();
        }

        function renderTelex() {
            const context = buildTelexContext();
            document.getElementById("mainPanel").innerHTML = `
                <div class="telex">
                    <section class="card">
                        <div class="item-title">
                            <h2 style="margin:0;">Connection</h2>
                            <span class="telex-status" id="telexStatus">LOGGED OFF</span>
                        </div>
                        <div class="field">
                            <label for="telexCallsign">Callsign</label>
                            <input id="telexCallsign" autocomplete="off" placeholder="HPF123" value="${escapeHtml(context.callsign)}">
                        </div>
                        <div class="field">
                            <label for="telexCode">Hoppie Logon Code</label>
                            <input id="telexCode" type="password" autocomplete="off" placeholder="Saved in Pilot Profile" value="${escapeHtml(context.logonCode)}">
                        </div>
                        <button class="primary-btn" id="telexLogonBtn">LOGON</button>
                        <button class="logout-btn" style="width:100%;margin-top:10px;" id="telexPollBtn">POLL INBOX</button>
                        <button class="logout-btn" style="width:100%;margin-top:10px;" id="loadVatsimPlanBtn">LOAD VATSIM FLIGHT PLAN</button>
                        <p class="empty" style="margin-top:12px;">LOGON validates the relay path. Use POLL INBOX to fetch Hoppie messages.</p>
                        <div class="data-list" style="margin-top:14px;">
                            <div class="data-row"><span>DEP</span><strong id="fpDep">${escapeHtml(context.dep)}</strong></div>
                            <div class="data-row"><span>ARR</span><strong id="fpArr">${escapeHtml(context.arr)}</strong></div>
                            <div class="data-row"><span>FL</span><strong id="fpLevel">${escapeHtml(context.level)}</strong></div>
                        </div>
                    </section>
                    <section class="card">
                        <h2>Message Station</h2>
                        <div class="field">
                            <label for="telexTo">To</label>
                            <input id="telexTo" autocomplete="off" placeholder="Station or callsign">
                        </div>
                        <div class="field">
                            <label for="telexMessage">Message</label>
                            <textarea id="telexMessage" placeholder="TYPE TELEX MESSAGE">${escapeHtml(context.route ? `REQUEST CLEARANCE ${context.dep}-${context.arr} ROUTE ${context.route}` : "")}</textarea>
                        </div>
                        <button class="primary-btn" id="telexSendBtn">SEND TELEX</button>
                        <div class="message-log" id="telexLog" style="margin-top:14px;min-height:210px;">HISPAFLY TELEX READY
SERVER RELAY REQUIRED BEFORE LIVE HOPPIE SEND/RECEIVE</div>
                    </section>
                    <section class="card">
                        <h2>Templates</h2>
                        <div class="template-grid">
                            <button class="template-btn" data-template="REQUEST IFR CLEARANCE ${escapeHtml(context.dep)} TO ${escapeHtml(context.arr)}">REQUEST IFR CLEARANCE</button>
                            <button class="template-btn" data-template="REQUEST CLIMB FL">REQUEST CLIMB</button>
                            <button class="template-btn" data-template="REQUEST DESCENT FL">REQUEST DESCENT</button>
                            <button class="template-btn" data-template="REQUEST DIRECT ">REQUEST DIRECT</button>
                            <button class="template-btn" data-template="WILCO">WILCO</button>
                            <button class="template-btn" data-template="UNABLE">UNABLE</button>
                            <button class="template-btn" data-template="STANDBY">STANDBY</button>
                        </div>
                        <div class="field" style="margin-top:14px;">
                            <label for="telexRoute">Flight Plan Route</label>
                            <textarea id="telexRoute" placeholder="VATSIM route">${escapeHtml(context.route)}</textarea>
                        </div>
                    </section>
                </div>
            `;

            document.getElementById("telexLogonBtn").addEventListener("click", () => {
                hoppieRequest("logon");
            });
            document.getElementById("telexSendBtn").addEventListener("click", () => {
                hoppieRequest("send");
            });
            document.getElementById("telexPollBtn").addEventListener("click", () => hoppieRequest("poll"));
            document.querySelectorAll("[data-template]").forEach((button) => {
                button.addEventListener("click", () => {
                    document.getElementById("telexMessage").value = button.dataset.template;
                });
            });
            document.getElementById("loadVatsimPlanBtn").addEventListener("click", loadVatsimFlightPlan);
        }

        async function hoppieRequest(action) {
            const callsign = document.getElementById("telexCallsign").value.trim().toUpperCase();
            const logon = document.getElementById("telexCode").value.trim();
            const to = document.getElementById("telexTo").value.trim().toUpperCase() || "SERVER";
            const packet = document.getElementById("telexMessage").value.trim();
            const log = document.getElementById("telexLog");
            const status = document.getElementById("telexStatus");

            if (!callsign || !logon) {
                status.textContent = "MISSING DATA";
                log.textContent += "\n\nCALLSIGN AND LOGON CODE ARE REQUIRED";
                return;
            }

            status.textContent = action === "poll" ? "POLLING" : "SENDING";
            log.textContent += `\n\n${action.toUpperCase()} ${callsign}${action === "send" ? ` TO ${to}` : ""}`;

            try {
                const res = await fetch("/api/hoppie", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action,
                        logon,
                        from: callsign,
                        to,
                        packet,
                        type: action === "send" ? "telex" : undefined
                    })
                });
                const json = await res.json();
                if (!res.ok || json.error) throw new Error(json.message || json.error || `HTTP ${res.status}`);
                status.textContent = json.raw?.trim()?.toUpperCase() === "OK" || json.ok ? "CONNECTED" : "RECEIVED";
                log.textContent += `\nHOPPIE RAW: ${json.raw || "OK"}`;
                if (Array.isArray(json.messages) && json.messages.length) {
                    json.messages.forEach((message) => {
                        log.textContent += `\nIN ${message.from || "UNKNOWN"} ${message.type || ""}\n${message.packet || message.raw}`;
                    });
                }
            } catch (err) {
                status.textContent = "ERROR";
                log.textContent += `\nHOPPIE ERROR: ${err.message}`;
            }
        }

        function buildTelexContext() {
            const settings = getTelexSettings();
            const booking = Array.isArray(bookingsData) && bookingsData.length ? bookingsData[0] : null;
            const networks = pilotData?.networks || {};
            return {
                logonCode: settings.logonCode || "",
                callsign: booking?.callsign || settings.defaultCallsign || "",
                vatsimId: networks.vatsim_id || pilotData?.vatsim_id || "",
                dep: booking ? shortAirport(booking, "departure") : "N/A",
                arr: booking ? shortAirport(booking, "arrival") : "N/A",
                level: booking?.altitude ? `FL${Math.round(Number(booking.altitude) / 100)}` : "N/A",
                route: booking?.user_route || ""
            };
        }

        async function loadVatsimFlightPlan() {
            const networks = pilotData?.networks || {};
            const vatsimId = networks.vatsim_id || pilotData?.vatsim_id;
            const log = document.getElementById("telexLog");
            if (!vatsimId) {
                log.textContent += "\n\nVATSIM ID NOT AVAILABLE IN PILOT PROFILE";
                return;
            }

            log.textContent += `\n\nLOADING VATSIM FLIGHT PLAN FOR ${vatsimId}...`;
            try {
                const res = await fetch(`https://api.vatsim.net/v2/members/${encodeURIComponent(vatsimId)}/flightplans`);
                if (!res.ok) throw new Error(`VATSIM HTTP ${res.status}`);
                const json = await res.json();
                const plan = Array.isArray(json) ? json[0] : (json.data?.[0] || json.results?.[0] || json.flightplans?.[0] || json);
                applyVatsimFlightPlan(plan || {});
                log.textContent += "\nVATSIM FLIGHT PLAN LOADED";
            } catch (err) {
                log.textContent += `\nVATSIM FLIGHT PLAN ERROR: ${err.message}`;
            }
        }

        function applyVatsimFlightPlan(plan) {
            const dep = plan.departure || plan.departure_airport || plan.dep || plan.departure_icao || "N/A";
            const arr = plan.arrival || plan.arrival_airport || plan.arr || plan.arrival_icao || "N/A";
            const route = plan.route || plan.flight_route || plan.filed_route || "";
            const altitude = plan.altitude || plan.cruise_tas || plan.flight_level || "N/A";
            document.getElementById("fpDep").textContent = dep;
            document.getElementById("fpArr").textContent = arr;
            document.getElementById("fpLevel").textContent = formatFlightLevel(altitude);
            document.getElementById("telexRoute").value = route;
            document.getElementById("telexMessage").value = `REQUEST CLEARANCE ${dep}-${arr} ROUTE ${route}`;
        }

        function formatFlightLevel(value) {
            const text = String(value || "N/A").toUpperCase();
            if (text.startsWith("FL")) return text;
            const num = Number.parseInt(text, 10);
            return Number.isFinite(num) ? `FL${Math.round(num / 100)}` : text;
        }

        function shortAirport(data, side) {
            const route = lookupRoute(data.route_id);
            if (route) return side === "departure" ? route.departure : route.arrival;
            const airport = lookupAirport(data?.[`${side}_id`]);
            return airport?.icao || data?.[`${side}_icao`] || data?.[`${side}_id`] || "N/A";
        }

        function renderFlightList(list, emptyMessage, isPirep = false) {
            if (!Array.isArray(list) || list.length === 0) {
                return `<p class="empty">${escapeHtml(emptyMessage)}</p>`;
            }

            return list.map((flight) => {
                const title = `${formatValue(flight.flight_number, "Flight")} ${formatValue(flight.callsign, "")}`.trim();
                const status = flight.status || flight.type || (isPirep ? "PIREP" : "Booking");
                return `
                    <article class="item">
                        <div class="item-title">
                            <span>${escapeHtml(title)}</span>
                            <span class="pill">${escapeHtml(status)}</span>
                        </div>
                        <div class="meta">
                            <span>From: ${escapeHtml(formatValue(flight.departure_icao || flight.departure_id))}</span>
                            <span>To: ${escapeHtml(formatValue(flight.arrival_icao || flight.arrival_id))}</span>
                            <span>Network: ${escapeHtml(formatValue(flight.network))}</span>
                            <span>Dep: ${escapeHtml(formatDate(flight.departure_time))}</span>
                            <span>Arr: ${escapeHtml(formatDate(flight.arrival_time))}</span>
                            <span>ID: ${escapeHtml(formatValue(flight.id))}</span>
                        </div>
                    </article>
                `;
            }).join("");
        }

        function buildName(user) {
            return `${formatValue(user.first_name, "")} ${formatValue(user.last_name, "")}`.trim() || user.name || "";
        }

        function getRank() {
            return rankData?.name || profileData?.rank?.name || pilotData?.rank?.name || pilotData?.rank_name || "N/A";
        }

        function getFlightTime() {
            const value = statisticsData?.flight_time_all_time?.formatted
                || statisticsData?.flight_time_all_time?.seconds
                || profileData?.flight_time
                || pilotData?.stats?.flight_time
                || pilotData?.total_flight_time;
            if (!value && value !== 0) return "N/A";
            if (typeof value === "number") {
                const totalMinutes = Math.floor(value / 60);
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                return `${hours}h ${minutes}m`;
            }
            return value;
        }

        function formatValue(value, fallback = "N/A") {
            return value === undefined || value === null || value === "" ? fallback : value;
        }

        function formatDate(value) {
            if (!value) return "N/A";
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
        }

        function escapeHtml(value) {
            return String(formatValue(value, ""))
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function logout() {
            localStorage.removeItem("vamsys_token");
            sessionStorage.removeItem("pkce_v");
            sessionStorage.removeItem("pkce_s");
            sessionStorage.removeItem("oauth_redirect_uri");
            localStorage.removeItem("pkce_v");
            localStorage.removeItem("pkce_s");
            localStorage.removeItem("oauth_redirect_uri");
            window.location.href = "index.html";
        }
    </script>
